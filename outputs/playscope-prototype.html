<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PlayScope</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #fff;
      --soft: #f8fbfc;
      --ink: #172033;
      --muted: #667085;
      --line: #dbe3ea;
      --teal: #008b84;
      --teal-soft: #e2f6f4;
      --coral: #ff624d;
      --amber: #d9822b;
      --red: #b42318;
      --shadow: 0 16px 40px rgba(22, 35, 56, .08);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); overflow-x: hidden; }
    button, input, textarea, select { font: inherit; }
    button, select, input, textarea {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }
    button {
      min-height: 39px;
      padding: 9px 12px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    button:hover { transform: translateY(-1px); border-color: #b8ced6; }
    input, select, textarea { width: 100%; padding: 10px 11px; outline: none; }
    textarea { resize: vertical; min-height: 116px; }
    input:focus, select:focus, textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0, 139, 132, .12); }

    .app { display: grid; grid-template-columns: 242px minmax(0, 1fr); min-height: 100vh; width: 100%; max-width: 100vw; overflow-x: hidden; }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--line);
      padding: 25px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-size: 26px; font-weight: 850; }
    .mark {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--teal), #40c5ba);
      position: relative;
      box-shadow: 0 8px 20px rgba(0, 139, 132, .18);
    }
    .mark:before {
      content: "";
      position: absolute;
      inset: 7px 8px;
      border-left: 9px solid #fff;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }
    .nav, .sidebar-foot { display: flex; flex-direction: column; gap: 7px; }
    .nav button, .sidebar-foot button {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      border: 0;
      background: transparent;
      color: #344054;
      padding: 12px 13px;
      min-height: 43px;
      text-align: left;
    }
    .nav button.active, .sidebar-foot button.active {
      color: #fff;
      background: var(--teal);
      box-shadow: 0 12px 24px rgba(0, 139, 132, .18);
    }
    .icon { width: 17px; height: 17px; flex: 0 0 auto; }
    .profile { margin-top: auto; padding-top: 18px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
    .avatar, .person {
      border-radius: 50%;
      background: linear-gradient(135deg, #1f2937, #0d9488);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }
    .avatar { width: 38px; height: 38px; font-size: 13px; }
    .profile strong, .profile span { display: block; }
    .profile strong { font-size: 13px; }
    .profile span { font-size: 12px; color: var(--muted); margin-top: 2px; }

    main { min-width: 0; max-width: 100%; padding: 18px; display: grid; gap: 14px; align-content: start; overflow-x: hidden; }
    .brief, .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .brief {
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
    }
    .section-title { display: flex; align-items: center; gap: 10px; margin: 0 0 14px; font-size: 18px; line-height: 1.2; }
    .brief-grid { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 14px 26px; }
    .field-label { color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .field-value { font-size: 14px; font-weight: 650; min-height: 20px; }
    .top-actions { display: flex; gap: 8px; align-items: center; white-space: nowrap; }
    .language-select { width: 132px; }
    .primary { background: var(--teal); border-color: var(--teal); color: #fff; }
    .coral { background: var(--coral); border-color: var(--coral); color: #fff; }
    .ghost { background: var(--soft); }

    .page-head { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin: 2px 0 0; }
    .page-head h2 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .page-head p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .grid { display: grid; gap: 14px; }
    .grid.two { grid-template-columns: minmax(0, 1fr) 390px; align-items: start; }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.half { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .panel-head { padding: 16px 16px 13px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .panel-head h3 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 9px; }
    .panel-body { padding: 16px; }
    .controls { display: flex; gap: 8px; align-items: center; }
    .controls select, .controls input { width: 160px; padding: 9px 10px; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--teal-soft);
      color: #05746e;
      font-weight: 750;
      font-size: 12px;
      padding: 5px 8px;
    }
    .stat {
      padding: 16px;
      min-height: 116px;
    }
    .stat small { display: block; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .stat strong { display: block; font-size: 32px; color: var(--ink); }
    .stat span { color: var(--teal); font-size: 13px; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { color: #475467; font-size: 12px; font-weight: 750; text-align: left; padding: 12px 14px; background: #fbfcfd; border-bottom: 1px solid var(--line); }
    td { padding: 13px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    td.compact-cell { max-width: 210px; white-space: normal; overflow-wrap: anywhere; }
    .cell-muted { color: var(--muted); font-size: 12px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    tr[data-index] { cursor: pointer; }
    tr.selected { background: linear-gradient(90deg, rgba(0, 139, 132, .08), rgba(0, 139, 132, .02)); outline: 1px solid #9ed8d4; outline-offset: -1px; }
    .table-wrap {
      max-width: 100%;
      overflow: auto;
      max-height: calc(100vh - 310px);
      border-radius: 8px;
      scrollbar-gutter: stable;
    }
    .table-wrap thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .name-cell { display: flex; align-items: center; gap: 10px; min-width: 160px; }
    .person { width: 36px; height: 36px; }
    .name-cell strong { display: block; font-size: 13px; }
    .name-cell span { color: var(--muted); font-size: 12px; }
    .bar { width: 92px; height: 5px; border-radius: 999px; background: #e5eaf0; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 8px; }
    .bar span { display: block; height: 100%; border-radius: inherit; background: var(--teal); }
    .score { color: var(--teal); font-size: 21px; font-weight: 850; line-height: 1; }
    .score small { display: block; font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 700; }
    .tag { display: inline-flex; padding: 4px 7px; border-radius: 5px; border: 1px solid; font-size: 12px; font-weight: 750; }
    .tag.good { color: var(--teal); border-color: #78cbc6; background: #f0fbfa; }
    .tag.warn { color: var(--amber); border-color: #f0ba72; background: #fff8ed; }
    .tag.no { color: var(--red); border-color: #f2a6a0; background: #fff3f1; }
    .detail { padding: 18px; position: sticky; top: 18px; max-height: calc(100vh - 36px); overflow: auto; }
    .detail-top { display: flex; gap: 14px; align-items: center; margin-bottom: 17px; }
    .detail .person { width: 66px; height: 66px; font-size: 20px; }
    .detail h3 { margin: 0 0 6px; font-size: 18px; }
    .meta { display: grid; gap: 5px; color: #344054; font-size: 13px; }
    .analysis-list { margin: 12px 0 18px; padding: 0 0 0 18px; color: #344054; line-height: 1.65; font-size: 13px; }
    .analysis-list li::marker { color: var(--teal); }
    .fit-grid { display: grid; grid-template-columns: 95px 1fr; gap: 14px; align-items: center; margin: 12px 0 18px; }
    .big-score { font-size: 40px; line-height: 1; color: var(--teal); font-weight: 850; }
    .big-score span { color: var(--muted); font-size: 14px; font-weight: 650; }
    .metrics { display: grid; gap: 8px; }
    .metric { display: grid; grid-template-columns: 95px 1fr 30px; gap: 8px; align-items: center; font-size: 12px; color: #475467; }
    .outreach { background: linear-gradient(135deg, #e2f7f5, #fff); border: 1px solid #bae3df; border-radius: var(--radius); padding: 14px; font-size: 13px; line-height: 1.45; color: #344054; }
    .detail-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 14px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .edit-drawer { margin-top: 14px; border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: rgba(255,255,255,.72); }
    .edit-drawer summary { cursor: pointer; font-weight: 800; margin-bottom: 10px; }
    .edit-grid { grid-template-columns: 1fr; gap: 8px; }
    .edit-grid input { padding: 8px 9px; font-size: 12px; }
    .note { color: var(--muted); font-size: 12px; line-height: 1.5; margin: 9px 0 0; }
    .result-box { background: var(--soft); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; min-height: 116px; line-height: 1.55; font-size: 14px; }
    .loc-output { display: grid; gap: 10px; white-space: normal; }
    .loc-output .meta { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); font-size: 12px; }
    .loc-output .option-card { border: 1px solid rgba(149, 120, 255, .25); border-radius: 8px; padding: 12px; background: rgba(255,255,255,.78); }
    .loc-output .option-card strong { display: block; margin-bottom: 6px; color: var(--ink); }
    .loc-batch-list { display: grid; gap: 10px; max-height: 360px; overflow: auto; padding-right: 4px; }
    .loc-batch-item { border: 1px solid rgba(149, 120, 255, .22); border-radius: 8px; padding: 12px; background: rgba(255,255,255,.7); }
    .loc-batch-item h4 { margin: 0 0 8px; font-size: 13px; }
    .localization-workspace .loc-main-grid { display: grid; grid-template-columns: minmax(320px, 1.1fr) minmax(280px, .9fr); gap: 16px; align-items: start; }
    .localization-workspace .loc-import-grid { display: grid; grid-template-columns: minmax(280px, .95fr) minmax(320px, 1.05fr); gap: 16px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line); }
    .localization-workspace textarea { min-height: 118px; }
    .localization-workspace .loc-import-grid textarea { min-height: 106px; }
    .localization-output-box { display: grid; gap: 12px; }
    .localization-output-box .loc-batch-list { max-height: none; padding-right: 0; }
    .task-list { display: grid; gap: 10px; }
    .task { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .task strong { display: block; font-size: 13px; }
    .task span { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }
    .empty { text-align: center; padding: 18px; color: var(--muted); font-size: 13px; }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: sticky; top: 0; z-index: 2; max-width: 100vw; flex-direction: row; align-items: center; overflow-x: auto; padding: 12px; gap: 12px; }
      .sidebar { scrollbar-width: none; }
      .sidebar::-webkit-scrollbar { display: none; }
      .brand span { display: inline; font-size: 20px; }
      .nav, .sidebar-foot { flex-direction: row; }
      .nav button, .sidebar-foot button { justify-content: center; white-space: nowrap; }
      .profile { display: none; }
      .grid.two, .grid.three { grid-template-columns: 1fr; }
      .brief-grid { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
      .detail { position: static; }
    }
    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: sticky; top: 0; z-index: 2; max-width: 100vw; flex-direction: row; align-items: center; overflow-x: auto; padding: 12px; }
      .sidebar { scrollbar-width: none; }
      .sidebar::-webkit-scrollbar { display: none; }
      .brand span { display: inline; font-size: 20px; }
      .nav, .sidebar-foot { flex-direction: row; }
      .profile { display: none; }
      main { padding: 12px; }
      .brief, .page-head { grid-template-columns: 1fr; flex-direction: column; align-items: stretch; }
      .brief-grid, .grid.half, .form-grid, .localization-workspace .loc-main-grid, .localization-workspace .loc-import-grid { grid-template-columns: 1fr; }
      .top-actions, .controls { flex-wrap: wrap; }
      table { min-width: 760px; }
    }

    /* Premium purple interface pass. Keeps the existing app logic intact. */
    :root {
      --bg: #f7f3ff;
      --surface: #ffffff;
      --soft: #fbf8ff;
      --ink: #20152f;
      --muted: #756982;
      --line: #e4d9f3;
      --teal: #7c3aed;
      --teal-soft: #f0e7ff;
      --coral: #d946ef;
      --amber: #b56a22;
      --red: #b42318;
      --violet: #8b5cf6;
      --pink: #d946ef;
      --deep: #2b1746;
      --shadow: 0 18px 46px rgba(74, 39, 122, .13);
    }
    body {
      background:
        radial-gradient(circle at 20% 0%, rgba(217, 70, 239, .16), transparent 32%),
        linear-gradient(180deg, #fbf8ff 0%, var(--bg) 42%, #f4effc 100%);
    }
    button, select, input, textarea {
      border-color: var(--line);
    }
    button {
      font-weight: 750;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }
    button:hover {
      border-color: #c4b5fd;
      box-shadow: 0 8px 18px rgba(124, 58, 237, .08);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, .14);
    }
    .sidebar {
      background: linear-gradient(180deg, #2b1746 0%, #241239 54%, #1b102a 100%);
      border-right: 1px solid rgba(255,255,255,.12);
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .brand {
      color: #fff;
      padding: 4px 7px 12px;
      align-items: center;
    }
    .brand span {
      color: #fff;
      font-size: 24px;
      line-height: 1;
    }
    .mark {
      background: linear-gradient(135deg, #a78bfa, #f0abfc);
      box-shadow: 0 14px 30px rgba(124,58,237,.22);
    }
    .nav button,
    .sidebar-foot button {
      color: #d9cced;
      border-radius: 8px;
      min-height: 42px;
    }
    .nav button:hover,
    .sidebar-foot button:hover {
      background: rgba(255,255,255,.07);
      color: #fff;
      box-shadow: none;
    }
    .nav button.active,
    .sidebar-foot button.active {
      background: linear-gradient(135deg, rgba(167,139,250,.22), rgba(217,70,239,.16));
      color: #fff;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: none;
    }
    .profile {
      border-top-color: rgba(255,255,255,.13);
      background: rgba(255,255,255,.07);
      border-radius: 8px;
      padding: 12px;
      color: #fff;
    }
    .profile span {
      color: #c9b8e6;
    }
    .profile button {
      width: 100%;
      min-height: 54px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      box-shadow: none;
    }
    .profile button:hover {
      transform: none;
      border-color: transparent;
      box-shadow: none;
    }
    .account-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(22, 10, 36, .46);
      backdrop-filter: blur(10px);
    }
    .account-modal.open {
      display: grid;
    }
    .account-card {
      width: min(420px, 100%);
      background: linear-gradient(180deg, #fff, #fbf8ff);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 28px 80px rgba(43, 23, 70, .28);
      overflow: hidden;
    }
    .account-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .account-head h3 {
      margin: 0;
      font-size: 18px;
    }
    .account-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .account-body {
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    .account-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 4px;
    }
    .account-close {
      width: 34px;
      min-height: 34px;
      padding: 0;
      border-radius: 999px;
      background: #fff;
    }
    .avatar,
    .person {
      background: linear-gradient(135deg, #6d28d9, #d946ef);
      color: #fff;
    }
    .brief {
      background: linear-gradient(135deg, rgba(255,255,255,.94), rgba(250,245,255,.9));
      border-color: var(--line);
      position: relative;
      overflow: hidden;
    }
    .brief:after {
      content: "";
      position: absolute;
      right: -80px;
      top: -90px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(217,70,239,.18), transparent 68%);
      pointer-events: none;
    }
    .brief > * {
      position: relative;
      z-index: 1;
    }
    .section-title {
      font-size: 22px;
      color: var(--ink);
    }
    .brief-grid {
      gap: 10px;
    }
    .brief-grid > div {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbf8ff);
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }
    .field-label {
      color: var(--muted);
      font-size: 11px;
    }
    .field-value {
      color: var(--ink);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .primary {
      background: linear-gradient(135deg, #7c3aed, #c026d3);
      border-color: #8b5cf6;
      color: #fff;
      box-shadow: 0 10px 22px rgba(124,58,237,.18);
    }
    .coral {
      background: linear-gradient(135deg, #d946ef, #f472b6);
      border-color: #f0abfc;
      color: #fff;
    }
    .ghost {
      background: #fff;
      color: #4b3b5f;
    }
    .panel {
      background: rgba(255,255,255,.92);
      border-color: var(--line);
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .panel:hover {
      box-shadow: 0 20px 48px rgba(74, 39, 122, .16);
    }
    .panel-head {
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(251,248,255,.68));
      border-bottom-color: var(--line);
    }
    .panel-head h3,
    .page-head h2 {
      color: var(--ink);
    }
    .page-head p,
    .note,
    .cell-muted,
    .muted,
    .task span {
      color: var(--muted);
    }
    .stat {
      background: linear-gradient(135deg, #ffffff, #f7edff);
    }
    .stat strong {
      color: var(--ink);
    }
    .stat span,
    .score,
    .big-score {
      color: var(--teal);
    }
    th {
      background: #fbf8ff;
      color: #536172;
      border-bottom-color: var(--line);
    }
    td {
      border-bottom-color: var(--line);
    }
    tbody tr {
      transition: background .16s ease;
    }
    tbody tr:hover {
      background: rgba(124,58,237,.045);
    }
    tr.selected {
      background: linear-gradient(90deg, rgba(124, 58, 237, .10), rgba(217, 70, 239, .04));
      outline: 1px solid #c4b5fd;
    }
    .bar {
      background: #eee7f8;
    }
    .bar span {
      background: linear-gradient(90deg, #7c3aed, #d946ef);
    }
    .tag.good,
    .pill {
      color: #6d28d9;
      background: #f4ecff;
      border-color: #c4b5fd;
    }
    .tag.warn {
      color: var(--amber);
      background: #fff8ed;
      border-color: #f0bb78;
    }
    .tag.no {
      color: var(--red);
      background: #fff7f5;
      border-color: #f1b8b2;
    }
    .result-box,
    .outreach,
    .task {
      background: linear-gradient(180deg, #fff, #fbf8ff);
      border-color: var(--line);
    }
    .outreach {
      color: #4b3b5f;
    }
    .detail {
      background: rgba(255,255,255,.92);
    }
    .analysis-list li::marker {
      color: var(--teal);
    }

        .replace(/avg\.?\s*(?:age|yas|yaş)\s*[:~-]?\s*/gi, "")
        .replace(/(?:average|ortalama)\s*(?:age|yas|yaş)\s*[:~-]?\s*/gi, "")
        .replace(/(?:M(?:ale)?|F(?:emale)?)[\s:]*\d+(?:\.\d+)?%/gi, "")
        .replace(/[;,/|]+\s*[;,/|]+/g, "; ")
        .replace(/^[\s:;,.~\-]+|[\s:;,.~\-]+$/g, "")
        .replace(/\s{2,}/g, " ");
      const avg = ageText.match(/(?:~\s*)?\d{1,2}(?:\.\d+)?/);
      const ranges = ageText.match(/\d{1,2}\s*[-–]\s*\d{1,2}\s*:?\s*\d+(?:\.\d+)?%/g) || [];
      if (ageSegments.length) ageText = ageSegments.join("; ");
      else if (ranges.length) ageText = ranges.map((range) => {
        const match = range.match(/(\d{1,2})\s*[-–]\s*(\d{1,2})\s*:?\s*(\d+(?:\.\d+)?)%/);
        return match ? `${match[1]}-${match[2]}: ${match[3]}%` : range;
      }).join("; ");
      else if (avg) ageText = avg[0].replace(/^~/, "").trim();
      return { age: ageText || "Missing", gender: genderText || "Missing" };
    }
    function normalizeInfluencer(item) {
      const genres = item.genres || [];

    function unavailableDemo(value) { return !value || value === "Missing" || value === "-" || value === "Unknown"; }

    function views(value) {
      const num = Number(value || 0);
      if (!num) return "-";
      return num >= 1000000 ? (num / 1000000).toFixed(1) + "M" : num >= 1000 ? Math.round(num / 1000) + "K" : String(num);
    }
    function parseYouTubeDuration(value) {
      const match = String(value || "").match(/^PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/);
      if (!match) return 0;
      return Number(match[1] || 0) * 3600 + Number(match[2] || 0) * 60 + Number(match[3] || 0);
    }
    function formatAverageDuration(seconds) {
      const total = Math.round(Number(seconds || 0));
      if (!total) return "-";
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const secs = total % 60;
      if (hours) return `${hours}h${String(minutes).padStart(2, "0")}m`;
      if (minutes) return `${minutes}m${String(secs).padStart(2, "0")}s`;
      return `${secs}s`;
    }
    function youtubeVideoKind(video) {
      const seconds = parseYouTubeDuration(video.contentDetails?.duration);
      const titleText = String(video.snippet?.title || "").toLowerCase();
      const hasLiveMeta = Boolean(video.liveStreamingDetails?.actualStartTime || video.liveStreamingDetails?.scheduledStartTime || video.liveStreamingDetails?.actualEndTime);
      const vodSignal = /\b(vod|canli|canlı|live|livestream|stream|yayın|yayin|yayını|yayini|canlı yayın|canli yayin|full yayın|full yayin|broadcast|replay|tekrar|tekrarı|tekrari)\b/i.test(titleText);
      if (seconds > 0 && seconds < 60) return "Short video";
      if (hasLiveMeta || vodSignal || seconds >= 2700) return "Stream replay video";
      if (seconds >= 180 && seconds <= 2400) return "Edited long video";
      if (seconds >= 60 && seconds < 180) return "Short edited video";
      if (seconds > 2400) return "Long video";
      return "Latest YouTube video";
    }
    function dominantVideoFormat(videoItems = []) {
      const counts = new Map();
      videoItems.forEach((video) => {
        const kind = youtubeVideoKind(video);
        counts.set(kind, (counts.get(kind) || 0) + 1);
      });
      const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]);
      if (!sorted.length) return "Latest YouTube videos";
      if (sorted.length > 1 && sorted[0][1] === sorted[1][1]) return `${sorted[0][0]} + ${sorted[1][0]}`;
      return sorted[0][0];
    }
    function averageCreatorDuration(videoItems = []) {
      const rows = videoItems
        .map((item) => ({ seconds: parseYouTubeDuration(item.contentDetails?.duration), kind: youtubeVideoKind(item) }))
        .filter((item) => Number.isFinite(item.seconds) && item.seconds > 0);
      if (!rows.length) return 0;
      const normalVideos = rows
        .filter((item) => item.seconds >= 180 && item.seconds <= 2400 && item.kind !== "Stream replay video")
        .map((item) => item.seconds);
      const editedLong = rows.filter((item) => item.kind === "Edited long video").map((item) => item.seconds);
      const shortEdited = rows.filter((item) => item.kind === "Short edited video").map((item) => item.seconds);
      const shorts = rows.filter((item) => item.kind === "Short video").map((item) => item.seconds);
      const vods = rows.filter((item) => item.kind === "Stream replay video").map((item) => item.seconds);
      const otherLong = rows.filter((item) => item.kind === "Long video").map((item) => item.seconds);
      let source = normalVideos.length >= 2 ? normalVideos : editedLong.length >= 2 ? editedLong : shortEdited.length >= 3 ? shortEdited : shorts.length >= 3 ? shorts : otherLong.length >= 2 ? otherLong : rows.map((item) => item.seconds);
      if (source !== vods && source.length < 2 && vods.length && rows.length === vods.length) source = vods;
      const sorted = [...source].sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)] || sorted[0];
      const noOutliers = sorted.length >= 4
        ? sorted.filter((value) => !(median <= 1800 && value > Math.max(2700, median * 1.8)))
        : sorted;
      const trimmed = noOutliers.length >= 5 ? noOutliers.slice(1, -1) : noOutliers;
      return Math.round(trimmed.reduce((sum, value) => sum + value, 0) / trimmed.length);
    }
    function latestMetricVideos(videoItems = []) {
      const ordered = [...videoItems].sort((a, b) => {
        const at = Date.parse(a.snippet?.publishedAt || "") || 0;
        const bt = Date.parse(b.snippet?.publishedAt || "") || 0;
        return bt - at;
      });
      const nonLiveVideos = ordered.filter((video) => {
        const seconds = parseYouTubeDuration(video.contentDetails?.duration);
        const kind = youtubeVideoKind(video);
        return kind !== "Stream replay video" && seconds > 0;
      });
      if (nonLiveVideos.length) return nonLiveVideos.slice(0, 10);
      const uploadedVods = ordered.filter((video) => {
        const seconds = parseYouTubeDuration(video.contentDetails?.duration);
        const kind = youtubeVideoKind(video);
        return kind === "Stream replay video" && seconds > 0;
      });
      return uploadedVods.slice(0, 10);
    }
    function averageVideoViews(videoItems = []) {
      const counts = videoItems
        .map((item) => Number(item.statistics?.viewCount || 0))
        .filter((value) => Number.isFinite(value) && value > 0);
      if (!counts.length) return 0;
      return Math.round(counts.reduce((sum, value) => sum + value, 0) / counts.length);
    }
    function averageVideoComments(videoItems = []) {
      const counts = videoItems
        .map((item) => Number(item.statistics?.commentCount || 0))
        .filter((value) => Number.isFinite(value));
      if (!counts.length) return 0;
      return Math.round(counts.reduce((sum, value) => sum + value, 0) / counts.length);
    }
    function estimateDemographics(item = {}) {
      const text = [item.category, item.subcategory, ...(item.genres || [])].join(" ").toLowerCase();
      const geo = String(item.geo || item.country || "").toUpperCase();
      let male = 72;
      if (text.includes("horror")) male = 58;
      if (text.includes("food") || text.includes("travel") || text.includes("mukbang")) male = 50;
      if (text.includes("beauty") || text.includes("fashion")) male = 25;

      if (geo.includes("TR") && text.includes("gaming")) male += 4;
      male = Math.max(20, Math.min(90, male));
      const female = 100 - male;
      let age = "18-24: 42%; 25-34: 30%; 35-44: 10%";
      if (text.includes("horror")) age = "18-24: 45%; 25-34: 25%; 35-44: 8%";
      if (text.includes("strategy")) age = "18-24: 32%; 25-34: 38%; 35-44: 14%";
      if (text.includes("food") || text.includes("travel")) age = "18-24: 28%; 25-34: 36%; 35-44: 18%";
      return { gender: `M${male}% / F${female}%`, age };
    }
    function fitScore(item) {
      const market = state.project.markets.toLowerCase().includes((item.flag || "").toLowerCase()) ? 7 : 0;
      const view = item.views > 100000 ? 5 : item.views > 70000 ? 2 : 0;
      const words = [state.project.genre, state.project.keywords].join(" ").toLowerCase();

    function detailNotes(item = {}) {

    function storeApiTargets() {
      const published = "https://playscope-team.onrender.com";
      if (location.protocol === "file:") return ["http://127.0.0.1:5184", "http://127.0.0.1:5183", "http://127.0.0.1:5182", "http://127.0.0.1:5180", published];
      if (location.hostname === "127.0.0.1" || location.hostname === "localhost") return ["", "http://127.0.0.1:5184", "http://127.0.0.1:5183", "http://127.0.0.1:5182", "http://127.0.0.1:5180", published];
      return ["", published];
    }

    async function fetchStoreApi(path, payload) {
      const errors = [];
      for (const target of storeApiTargets()) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 12000);
        try {
          const response = await fetch(`${target}${path}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            signal: controller.signal,
            body: JSON.stringify(payload)
          });
          clearTimeout(timeout);
          if (response.status === 404) {
            errors.push(`${target || "local"}: not found`);
            continue;
          }
          const text = await response.text();
          let result;
          try {
            result = JSON.parse(text);
          } catch (parseError) {
            errors.push(`${target || "local"}: invalid response`);
            continue;
          }
          if (result.ok && result.results?.length) return result;
          errors.push(result.error || `${target || "local"}: no results`);
        } catch (error) {
          clearTimeout(timeout);
          errors.push(error.name === "AbortError" ? `${target || "local"} timed out` : error.message);
        }
      }
      throw new Error(errors.filter(Boolean).slice(-2).join(" / ") || "Store search failed.");
    }

    async function searchStoreCompetitors(store) {
      const status = $("googlePlayStatus");
      const button = store === "app-store" ? $("appStoreSearchBtn") : $("googlePlaySearchBtn");
      const label = store === "app-store" ? "App Store" : "Google Play";
      state.googlePlayQuery = $("gpQuery").value.trim();
      state.googlePlayLang = $("gpLang").value;
      state.googlePlayCountry = $("gpCountry")?.value || storeCountryFromLang(state.googlePlayLang);
      if (!state.googlePlayQuery) {
        if (status) status.textContent = "Write a game name or genre first.";
        return;
      }
      state.googlePlayResults = [];
      state.competitorStore = store === "app-store" ? "App Store" : "Google Play";
      state.selectedCompetitor = 0;
      if (status) status.textContent = `Searching ${label}...`;
      if (button) {
        button.disabled = true;
        button.textContent = "Searching...";
      }
      try {
        if (store === "google-play") {
          try {
            const serpResults = await directSerpApiGooglePlaySearch(state.googlePlayQuery, state.googlePlayLang, state.googlePlayCountry);
            if (serpResults.length) {
              state.googlePlayResults = serpResults;
              state.competitorStore = "Google Play";
              state.selectedCompetitor = 0;
              saveState();
              render();
              return;
            }
          } catch (serpError) {
            if (status) status.textContent = "Trying Google Play backend search...";
          }
        }
        if (store === "app-store") {
          try {
            const directResults = await directAppStoreSearch(state.googlePlayQuery, state.googlePlayLang, state.googlePlayCountry);
            if (directResults.length) {
              state.googlePlayResults = directResults;
              state.competitorStore = "App Store";
              state.selectedCompetitor = 0;
              saveState();
              render();
              return;
            }
          } catch (directError) {
            if (status) status.textContent = "Trying App Store backend search...";
          }
        }
        const result = await fetchStoreApi(store === "app-store" ? "/api/app-store-search" : "/api/google-play-search", { query: state.googlePlayQuery, lang: state.googlePlayLang, country: state.googlePlayCountry, limit: 5 });
        state.googlePlayResults = result.results;
        state.competitorStore = store === "app-store" ? "App Store" : "Google Play";
        state.selectedCompetitor = 0;
        saveState();
        render();
      } catch (error) {
        const message = error.name === "AbortError" ? `${label} did not answer in time. Try once more.` : error.message;
        if (status) {
          if (store === "google-play" && /fetch failed|Failed to fetch|network|parser is not installed|Could not connect|SerpAPI key is missing/i.test(message)) {
            status.textContent = "Google Play needs SerpAPI. Add the key in Settings, save it, then search again.";
          } else {
            status.textContent = `${label} search failed: ${message}`;
          }
        }
        saveState();
        setTimeout(() => {
          const stillStatus = $("googlePlayStatus")?.textContent || "";
          render();
          const nextStatus = $("googlePlayStatus");
          if (nextStatus && stillStatus) nextStatus.textContent = stillStatus;
        }, 0);
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = store === "app-store" ? "Search App Store" : "Search Google Play";
        }
      }
    }

    function storeCountryFromLang(lang) {
      if (lang === "tr") return "TR";
      if (lang === "de") return "DE";
      if (lang === "ja") return "JP";
      if (lang === "zh") return "CN";
      return "US";
    }

    function competitorOverview(item = {}) {
      const text = `${item.name || ""} ${item.desc || ""} ${item.keywords || ""}`.toLowerCase();
      let type = "Mobile game";
      if (/strategy|empire|alliance|kingdom|war|conquer|base|fleet/.test(text)) type = "Strategy / 4X";
      else if (/rpg|hero|guild|raid|quest|dungeon|loot/.test(text)) type = "MMO / RPG";
      else if (/fps|shooter|gun|weapon|battle royale|squad/.test(text)) type = "FPS / Shooter";
      else if (/match|puzzle|merge|tile|casual/.test(text)) type = "Casual / Puzzle";
      else if (/race|racing|car|drift|speed/.test(text)) type = "Racing";
      const first = clientFirstSentence(item.desc || item.message || "");
      const market = [state.googlePlayCountry, state.googlePlayLang].filter(Boolean).join(" / ");
      return `Type: ${type}\nMarket: ${market || "-"}\nCore message: ${first || item.message || "No description loaded."}\nKeyword angle: ${item.keywords || "No keywords loaded."}`;
    }

    function mapSerpGooglePlayItem(item) {

    function flattenSerpResults(data) {
      const buckets = [data.organic_results, data.app_highlight, data.results, data.items_highlight, data.ads_results].filter(Boolean);
      const flat = [];
      buckets.forEach((bucket) => {
        (Array.isArray(bucket) ? bucket : [bucket]).forEach((item) => {
          if (Array.isArray(item.items)) flat.push(...item.items);
          else if (Array.isArray(item.apps)) flat.push(...item.apps);
          else if (Array.isArray(item.items_highlight)) item.items_highlight.flat().forEach((entry) => flat.push(entry));
          else flat.push(item);
        });
      });
      const seen = new Set();
      return flat.filter((item) => {
        const key = item.product_id || item.app_id || item.package_name || item.title || item.name;
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    async function directSerpApiGooglePlaySearch(query, lang, country) {
      const key = await loadSerpApiKey();
      if (!key) throw new Error("SerpAPI key is missing.");
      const url = `https://serpapi.com/search.json?engine=google_play&store=apps&q=${encodeURIComponent(query)}&hl=${encodeURIComponent(lang || "en")}&gl=${encodeURIComponent(String(country || storeCountryFromLang(lang)).toLowerCase())}&api_key=${encodeURIComponent(key)}`;
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 20000);
      const response = await fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timeout));
      if (!response.ok) throw new Error(`SerpAPI HTTP ${response.status}`);
      const text = await response.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (error) {
        throw new Error(`SerpAPI returned non-JSON response: ${text.replace(/\s+/g, " ").slice(0, 120)}`);
      }
      if (data.error) throw new Error(data.error);
      return flattenSerpResults(data).slice(0, 5).map(mapSerpGooglePlayItem);
    }

    function clientKeywords(text) {
      const stop = new Set("the and for with you your our are this that from into game play apps app mobile free new now all can will get more best build create games".split(" "));
      const counts = {};
      String(text || "").toLowerCase().match(/[a-z][a-z0-9-]{2,}/g)?.forEach((word) => {
        if (!stop.has(word)) counts[word] = (counts[word] || 0) + 1;
      });
      return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10).map(([word]) => word).join(", ");
    }

    function clientFirstSentence(text) {
      const sentence = String(text || "").split(/(?<=[.!?])\s+/)[0] || "";
      return sentence.length > 130 ? `${sentence.slice(0, 127)}...` : sentence;
    }

    async function youtubeFromBrowser(input, apiKey) {
      try {
        const lookup = parseYouTubeLookup(input.name || "");
        let channelId = lookup.channelId;
        let searchTitle = "";
        if (!channelId && lookup.handle) {
          const handleCandidates = [...new Set([lookup.handle.replace(/^@/, ""), lookup.handle])];
          for (const handleCandidate of handleCandidates) {
            const handleUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${encodeURIComponent(handleCandidate)}&key=${encodeURIComponent(apiKey)}`;
            const handleResponse = await fetch(handleUrl);
            const handleData = await handleResponse.json();
            if (handleResponse.ok && handleData.items?.[0]) {
              channelId = handleData.items[0].id;
              break;
            }
          }
        }
        if (!channelId) {
          const queries = [...new Set([
            lookup.query,
            input.fallbackName,
            String(input.fallbackName || "").replace(/^@/, ""),
            String(input.name || "").replace(/^@/, "")
          ].map((value) => String(value || "").trim()).filter(Boolean).filter((value) => !isMetricOnlyText(value)))];
          let lastReason = "";
          for (const rawQuery of queries) {
            const query = encodeURIComponent(rawQuery);
            const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&maxResults=3&q=${query}&key=${encodeURIComponent(apiKey)}`;
            const searchResponse = await fetch(searchUrl);
            const search = await searchResponse.json();
            if (!searchResponse.ok) {
              lastReason = search.error?.errors?.[0]?.reason || search.error?.message || `HTTP ${searchResponse.status}`;
              continue;
            }
            const items = search.items || [];
            const preferred = chooseBestChannelSearchResult(items, rawQuery, input.fallbackName || input.name || "");
            channelId = preferred?.snippet?.channelId;
            searchTitle = preferred?.snippet?.title || "";
            if (channelId) break;
          }
          if (!channelId && lastReason) return { ...localResearchResult(input), notes: `YouTube API error from browser: ${lastReason}` };
        }
        if (!channelId) return { ...localResearchResult(input), notes: "No YouTube channel found. Try exact channel name, channel URL, channel ID, or @handle." };

        const channelUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${encodeURIComponent(apiKey)}`;
        const channelResponse = await fetch(channelUrl);
        const channelData = await channelResponse.json();
        if (!channelResponse.ok || !channelData.items?.[0]) {
          const reason = channelData.error?.errors?.[0]?.reason || channelData.error?.message || `HTTP ${channelResponse.status}`;
          return { ...localResearchResult(input), notes: `YouTube API error from browser: ${reason}` };
        }
        const channel = channelData.items[0];
        const videoSearchUrl = `https://www.googleapis.com/youtube/v3/search?part=id&channelId=${channelId}&order=date&type=video&maxResults=50&key=${encodeURIComponent(apiKey)}`;
        const videoSearch = await fetch(videoSearchUrl).then((res) => res.json()).catch(() => ({ items: [] }));
        const videoIds = (videoSearch.items || []).map((item) => item.id?.videoId).filter(Boolean);
        let avgViews = 0;
        let avgComments = 0;
        let avgDurationSeconds = 0;
        let videoItems = [];
        let metricVideoCount = 0;
        let metricVideos = [];
        if (videoIds.length) {
          const videosUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails,liveStreamingDetails&id=${videoIds.join(",")}&key=${encodeURIComponent(apiKey)}`;
          const videoData = await fetch(videosUrl).then((res) => res.json()).catch(() => ({ items: [] }));
          videoItems = videoData.items || [];
          metricVideos = latestMetricVideos(videoItems);
          metricVideoCount = metricVideos.length;
          avgViews = averageVideoViews(metricVideos);
          avgComments = averageVideoComments(metricVideos);
          avgDurationSeconds = averageCreatorDuration(metricVideos);
        }
        const totalViews = Number(channel.statistics?.viewCount || 0);
        const subscribers = channel.statistics?.hiddenSubscriberCount ? "hidden" : (channel.statistics?.subscriberCount || "unknown");
        const videoContentText = videoItems.map((video) => [video.snippet?.title, video.snippet?.description, ...(video.snippet?.tags || [])].join(" ")).join(" ");
        const contentText = [
          channel.snippet?.title,
          channel.snippet?.description,
          videoContentText
        ].join(" ");
        const ruleClassification = mergeClassifications(
          classifyCreatorContent(contentText),
          classifyYouTubeVideoSet(videoItems, videoContentText)
        );
        let classification = await classifyCreatorContentWithGPT(channel, videoItems, ruleClassification);
        const creatorProfile = knownCreatorProfile(`${channel.snippet?.title || ""} ${channel.snippet?.customUrl || ""} ${input.name || ""}`);
        if (creatorProfile) classification = creatorProfile;
        const keywordText = videoKeywordText(metricVideos.length ? metricVideos : videoItems);
        const detectedGames = detectPlayedGames(`${keywordText} ${contentText}`);
        const rawKeywordList = [...detectedGames, ...extractKeywords(keywordText || contentText), ...(classification.keywords || [])]
          .filter(Boolean);
        const keywords = cleanKeywordList(rawKeywordList, channel).join(", ");
        const genres = classification.genres.length ? classification.genres : extractKeywords(contentText).slice(0, 5);
        const gameText = detectedGames.length ? ` Detected games: ${detectedGames.join(", ")}.` : "";
        const evidenceText = classification.evidence?.length ? ` Evidence: ${classification.evidence.slice(0, 3).join(" | ")}.` : "";
        const videoFormat = metricVideos.length ? dominantVideoFormat(metricVideos) : "No regular videos found";
        return {
          source: "youtube-live",
          name: channel.snippet?.title || input.name,
          handle: "@" + (channel.snippet?.customUrl || channel.snippet?.title || input.name || "creator").replace(/^@/, "").toLowerCase().replace(/[^a-z0-9_.-]/g, ""),
          country: input.country || channel.snippet?.country || "Unknown",
          geo: input.country ? `${input.country}` : (channel.snippet?.country || "Unknown"),
          category: classification.category,
          subcategory: classification.subcategory,
          subscribers: subscribers === "hidden" ? "hidden" : views(Number(subscribers)),
          gender: "Missing",
          age: "Missing",
          avgComments,
          flag: input.country === "Germany" ? "DE" : input.country === "USA" ? "US" : "TR",
          channel: "YouTube",
          link: `https://www.youtube.com/channel/${channelId}`,
          views: avgViews || Number(input.views) || 0,
          match: classification.confidence,
          format: videoFormat,
          duration: formatAverageDuration(avgDurationSeconds),
          keywords,
          comments: `Matched channel: ${channel.snippet?.title || searchTitle || input.name}. Latest ${metricVideoCount || videoIds.length} videos used for averages. Avg comments: ${views(avgComments)}. Category source: ${classification.source}.${gameText}${evidenceText}`,
          genres,
          tone: "youtube live",
          audience: `${subscribers} subscribers`,
          notes: `Live YouTube data loaded. Category: ${classification.category} / ${classification.subcategory}. Matched channel: ${channel.snippet?.title || searchTitle || input.name}. Latest ${metricVideoCount || videoIds.length} video average views: ${avgViews ? views(avgViews) : "unavailable"}. Avg comments: ${views(avgComments)}. Avg duration: ${formatAverageDuration(avgDurationSeconds)}. Total channel views: ${views(totalViews)}. Videos checked: ${videoIds.length}. ${classification.reason}${gameText}${evidenceText}`,
          shortlisted: false,
          note: ""
        };
      } catch (error) {
        return { ...localResearchResult(input), notes: `Browser YouTube request failed: ${error.message}` };
      }
    }

    function parseYouTubeLookup(raw) {
      const value = String(raw || "").trim();
      const channelMatch = value.match(/youtube\.com\/channel\/(UC[\w-]{20,})/i) || value.match(/\b(UC[\w-]{20,})\b/);
      if (channelMatch) return { channelId: channelMatch[1], query: value };
      const handleMatch = value.match(/youtube\.com\/@([A-Za-z0-9._-]+)/i) || value.match(/^@([A-Za-z0-9._-]+)$/);
      if (handleMatch) return { handle: "@" + handleMatch[1], query: handleMatch[1] };
      const videoMatch = value.match(/[?&]v=([A-Za-z0-9_-]{6,})/i) || value.match(/youtu\.be\/([A-Za-z0-9_-]{6,})/i);
      if (videoMatch) return { videoId: videoMatch[1], query: value };
      return { query: value };
    }

    function chooseBestChannelSearchResult(items = [], query = "", fallbackName = "") {
      if (!items.length) return null;
      const wanted = normalizeSearchText(fallbackName || query);
      if (!wanted) return items[0];
      return [...items].sort((a, b) => {

        let score = profile.yt.includes(ytCategory) ? 2.4 : 0;
        const evidence = [];
        profile.words.forEach((word) => {
          const needle = word.toLowerCase();
          if (title.includes(needle)) { score += 4; evidence.push(`title:${word}`); }
          if (tags.includes(needle)) { score += 3; evidence.push(`tag:${word}`); }
          if (description.includes(needle)) { score += 1; evidence.push(`desc:${word}`); }
        });
        return { ...profile, score: score * recencyWeight, evidence, ytCategory };
      }).sort((a, b) => b.score - a.score)[0];

    function splitDelimitedLine(line, separator) {
      const cells = [];
      let cell = "";
      let quoted = false;
      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        const next = line[index + 1];
        if (char === '"' && quoted && next === '"') {
          cell += '"';
          index += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === separator && !quoted) {
          cells.push(cell.trim());
          cell = "";
        } else {
          cell += char;
        }
      }
      cells.push(cell.trim());
      return cells;
    }

    function parseDelimitedRows(raw) {
      const textValue = String(raw || "").replace(/\r/g, "").trim();
      if (!textValue) return [];
      const separator = textValue.includes("\t") ? "\t" : (textValue.includes(";") && !textValue.includes(",") ? ";" : ",");
      return textValue.split("\n").map((line) => splitDelimitedLine(line, separator)).filter((row) => row.some(Boolean));
    }

    function rowsToObjects(rows) {
      if (!rows.length) return [];
      const first = rows[0].map((cell) => String(cell || "").toLowerCase());
      const hasUrlInFirstRow = first.some((cell) => /youtube\.com|youtu\.be|^@[\w.-]+$/i.test(cell.trim()));
      const hasHeader = rows.length > 1 && !hasUrlInFirstRow && first.some((cell) => /channel|name|link|url|youtube|geo|country/.test(cell));
      const withRowIndex = (row, rowIndex) => {
        Object.defineProperty(row, "__excelRow", { value: rowIndex, enumerable: false, configurable: true });
        return row;
      };
      if (!hasHeader) {
        return rows.map((row, index) => withRowIndex(Object.fromEntries(row.map((cell, cellIndex) => [`cell${cellIndex}`, cell])), index + 1));
      }
      const headers = rows[0].map((cell, index) => String(cell || `Column ${index + 1}`).trim() || `Column ${index + 1}`);
      return rows.slice(1).map((row, index) => withRowIndex(Object.fromEntries(headers.map((header, cellIndex) => [header, row[cellIndex] || ""])), index + 2));
    }

    function compactKey(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function fieldFromRow(row, aliases) {
      const entries = Object.entries(row);
      const wanted = aliases.map(compactKey);
      const exact = entries.find(([key]) => wanted.includes(compactKey(key)));
      if (exact) return String(exact[1] || "").trim();
      const loose = entries.find(([key]) => wanted.some((alias) => compactKey(key).includes(alias)));
      return loose ? String(loose[1] || "").trim() : "";
    }

    function extractAudienceHintsFromText(value) {
      const text = String(value || "").replace(/\r/g, "\n");
      const compact = text.replace(/\s+/g, " ").trim();
      const result = {};
      const ageGroups = ["13-17", "18-24", "25-34", "35-44", "45-54", "55-64", "65+"];
      const ageValues = {};
      let femaleTotal = 0;
      let maleTotal = 0;
      for (const age of ageGroups) {
        const escaped = age.replace("+", "\\+");
        const splitMatch = compact.match(new RegExp(`${escaped}[^;\\n,|]*?F(?:emale)?\\s*[:=]?\\s*(\\d+(?:[.,]\\d+)?)\\s*%[^;\\n,|]*?M(?:ale)?\\s*[:=]?\\s*(\\d+(?:[.,]\\d+)?)\\s*%`, "i"))
          || compact.match(new RegExp(`${escaped}[^;\\n,|]*?M(?:ale)?\\s*[:=]?\\s*(\\d+(?:[.,]\\d+)?)\\s*%[^;\\n,|]*?F(?:emale)?\\s*[:=]?\\s*(\\d+(?:[.,]\\d+)?)\\s*%`, "i"));
        if (splitMatch) {
          const first = Number(normalizeNumberText(splitMatch[1]));
          const second = Number(normalizeNumberText(splitMatch[2]));
          const female = /F(?:emale)?\s*[:=]?\s*\d/i.test(splitMatch[0]) && splitMatch[0].search(/F(?:emale)?/i) < splitMatch[0].search(/M(?:ale)?/i) ? first : second;
          const male = female === first ? second : first;
          ageValues[age] = Math.round(female + male);
          femaleTotal += female;
          maleTotal += male;
          continue;
        }
        const totalMatch = compact.match(new RegExp(`${escaped}\\s*[:=]?\\s*(\\d+(?:[.,]\\d+)?)\\s*%`, "i"));
        if (totalMatch) ageValues[age] = Math.round(Number(normalizeNumberText(totalMatch[1])));
      }
      const ageParts = ageGroups.map((age) => ageValues[age] ? `${age}: ${ageValues[age]}%` : "").filter(Boolean);
      if (ageParts.length) result.age = ageParts.join("; ");
      if (femaleTotal + maleTotal > 0) {
        const total = femaleTotal + maleTotal;
        result.gender = `F${Math.round(femaleTotal / total * 100)}% / M${Math.round(maleTotal / total * 100)}%`;
      } else {
        const fmMatch = compact.match(/F(?:emale)?\s*[:=]?\s*(\d+(?:[.,]\d+)?)\s*%[^0-9]+M(?:ale)?\s*[:=]?\s*(\d+(?:[.,]\d+)?)\s*%/i);
        const mfMatch = compact.match(/M(?:ale)?\s*[:=]?\s*(\d+(?:[.,]\d+)?)\s*%[^0-9]+F(?:emale)?\s*[:=]?\s*(\d+(?:[.,]\d+)?)\s*%/i);
        if (fmMatch) result.gender = `F${Math.round(Number(normalizeNumberText(fmMatch[1])))}% / M${Math.round(Number(normalizeNumberText(fmMatch[2])))}%`;
        else if (mfMatch) result.gender = `F${Math.round(Number(normalizeNumberText(mfMatch[2])))}% / M${Math.round(Number(normalizeNumberText(mfMatch[1])))}%`;
      }
      return result;
    }

    function closestExcelRow(rows, excelRow) {
      const rowNo = Number(excelRow || 0);
      if (!rowNo || !rows.length) return null;
      return rows
        .map((row) => ({ row, distance: Math.abs(Number(row.__excelRow || 0) - rowNo) }))
        .filter((item) => Number.isFinite(item.distance))
        .sort((a, b) => a.distance - b.distance)[0]?.row || null;

    function findYouTubeSeedFromRow(row, index) {
      const values = Object.values(row).map((value) => String(value || "").trim()).filter(Boolean);
      const directLink = cleanYouTubeSeedLink(fieldFromRow(row, ["link", "url", "youtube", "youtube link", "channel url"]));
      const scannedLink = values.map(cleanYouTubeSeedLink).find(Boolean);
      const link = directLink || scannedLink || "";
      const explicitName = fieldFromRow(row, ["channel name", "name", "creator", "influencer", "kanal", "influencer name"]);
      const firstText = values.find((value) => value !== link && !cleanYouTubeSeedLink(value) && !/^[@＠]\s*$/u.test(value) && !/^https?:/i.test(value) && !isMetricOnlyText(value));
      const name = explicitName || firstText || (link ? `Creator ${index + 1}` : "");
      if (isInvalidYouTubeSeedLink(link) && !name) return { name: "", link: "", country: "", raw: row };
      if (isMetricOnlyText(name) && !link) return { name: "", link: "", country: "", raw: row };
      return {
        name,
        link,
        country: fieldFromRow(row, ["geo", "country", "market", "ülke", "ulke"]) || "Turkey",
        raw: row
      };
    }

    function isInvalidYouTubeSeedLink(value) {
      const text = String(value || "").trim().replace(/^＠/, "@");
      if (!text || text === "@" || /^@[\W_]*$/u.test(text)) return true;
      if (/^@/.test(text)) return !/^@[\p{L}\p{N}._-]{2,}$/u.test(text);
      return !/youtube\.com|youtu\.be/i.test(text);
    }

    function cleanYouTubeSeedLink(value) {
      const text = String(value || "").trim().replace(/^＠/, "@");
      if (isInvalidYouTubeSeedLink(text)) return "";
      if (/^www\.youtube\.com/i.test(text)) return `https://${text}`;
      return text;
    }

    function isMetricOnlyText(value) {
      const text = String(value || "").trim();
      if (!text) return true;
      return /^(\d+(?:[.,]\d+)?\s*[KMB]?\s*)?(followers?|subscribers?|avg\s*view|avg\s*eng|monthly\s*post|mthly\s*post|likes?|comments?)$/i.test(text)
        || /^\d+(?:[.,]\d+)?\s*[KMB]?\s*(followers?|subscribers?)$/i.test(text)
        || /^\d+(?:[.,]\d+)?%$/.test(text);
    }

    async function analyzeInfluencerRows(rows, statusId) {
      const status = statusId ? $(statusId) : null;
      const seeds = rows.map(findYouTubeSeedFromRow).filter((seed) => seed.link || seed.name);
      if (!seeds.length) {
        if (status) status.textContent = "No usable Channel Name or YouTube Link found.";
        return;
      }
      await ensureBrowserYouTubeKey();
      if (!state.api?.youtube) {
        if (status) status.textContent = "YouTube API key gerekli. Settings sayfasina key'i kaydet.";
        return;
      }
      const imported = [];
      const skipped = [];
      for (let index = 0; index < seeds.length; index += 1) {
        const seed = seeds[index];
        if (status) status.textContent = `Analyzing ${index + 1}/${seeds.length}: ${seed.name || seed.link}`;
        const live = await youtubeFromBrowser({
          name: seed.link || seed.name,
          fallbackName: seed.name,
          country: seed.country || "Turkey",
          channel: "YouTube",
          views: 0,
          genres: "",
          project: state.project
        }, state.api.youtube);
        const hints = getImportedRowHints(seed.raw || {});
        if (live.source !== "youtube-live" && !hasUsefulImportedMetrics(hints)) {
          skipped.push(seed.name || seed.link);
          continue;
        }
        const extraNotes = Object.entries(hints).filter(([, value]) => value).map(([key, value]) => `${key}: ${value}`).join("; ");
        const importedComment = fieldFromRow(seed.raw || {}, ["comments", "notes", "comment"]) || "";
        imported.push(normalizeInfluencer({
          ...live,
          name: live.name || seed.name,
          link: live.link || seed.link,
          country: live.country || seed.country,
          geo: hints.geo || live.geo || seed.country,
          gender: hints.gender || live.gender,
          age: hints.age || live.age,
          subscribers: live.source === "youtube-live" ? live.subscribers : (hints.subscribers || live.subscribers),
          views: live.source === "youtube-live" ? live.views : (Number(String(hints.views || "").replace(/[^\d]/g, "")) || live.views),
          avgComments: live.source === "youtube-live" ? live.avgComments : (Number(String(hints.avgComments || "").replace(/[^\d]/g, "")) || live.avgComments),
          format: live.format || hints.format || "-",
          duration: live.duration || hints.duration || "-",
          keywords: live.keywords || hints.keywords,
          comments: `${live.comments || "Imported and checked with YouTube API."}${extraNotes || importedComment ? " Imported visual/list data: " + [extraNotes, importedComment].filter(Boolean).join("; ") : ""}`,
          notes: `${live.notes || "Imported and checked with YouTube API."}${extraNotes || importedComment ? " Imported visual/list data: " + [extraNotes, importedComment].filter(Boolean).join("; ") : ""}`
        }));
      }
      let addedCount = 0;
      let updatedCount = 0;
      let lastIndex = 0;
      imported.reverse().forEach((item) => {
        const result = mergeInfluencerIntoList(item);
        if (result.action === "updated") updatedCount += 1;
        else addedCount += 1;
        lastIndex = result.index;
      });
      state.selected = lastIndex;
      saveState();
      render();
      const nextStatus = statusId ? $(statusId) : null;
      if (nextStatus) {
        const skippedText = skipped.length ? ` ${skipped.length} row could not be matched, so it was not added.` : "";
        nextStatus.textContent = `Done. ${addedCount} added, ${updatedCount} updated.${skippedText}`;
      }
    }

    function zipReadString(view, offset, length) {
      const bytes = new Uint8Array(view.buffer, view.byteOffset + offset, length);
      return new TextDecoder().decode(bytes);
    }

    async function inflateZipBytes(bytes) {
      if (typeof DecompressionStream === "undefined") throw new Error("Browser cannot decompress Excel images.");
      const tryFormats = ["deflate-raw", "deflate"];
      let lastError = null;
      for (const format of tryFormats) {
        try {
          const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream(format));
          return new Uint8Array(await new Response(stream).arrayBuffer());
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("Excel image decompression failed.");
    }

    function normalizeZipPath(value) {
      const parts = String(value || "").replace(/\\/g, "/").split("/");
      const stack = [];
      for (const part of parts) {
        if (!part || part === ".") continue;
        if (part === "..") stack.pop();
        else stack.push(part);
      }
      return stack.join("/");
    }

    function resolveZipTarget(fromPath, target) {
      if (!target) return "";
      if (/^\//.test(target)) return normalizeZipPath(target.replace(/^\/+/, ""));
      return normalizeZipPath(`${fromPath.split("/").slice(0, -1).join("/")}/${target}`);
    }

    function extractDrawingImageAnchors(entriesByName) {
      const anchors = new Map();
      for (const [drawingPath, drawingXml] of entriesByName) {
        if (!/^xl\/drawings\/drawing\d+\.xml$/i.test(drawingPath)) continue;
        const relPath = drawingPath.replace(/^xl\/drawings\//i, "xl/drawings/_rels/") + ".rels";
        const relXml = entriesByName.get(relPath) || "";
        const rels = new Map();
        for (const rel of relXml.matchAll(/<Relationship\b[^>]*Id="([^"]+)"[^>]*Target="([^"]+)"/gi)) {
          rels.set(rel[1], resolveZipTarget(drawingPath, rel[2]));
        }
        const blocks = drawingXml.match(/<xdr:(?:twoCellAnchor|oneCellAnchor|absoluteAnchor)\b[\s\S]*?<\/xdr:(?:twoCellAnchor|oneCellAnchor|absoluteAnchor)>/gi) || [];
        for (const block of blocks) {
          const rowMatch = block.match(/<xdr:from>[\s\S]*?<xdr:row>(\d+)<\/xdr:row>/i);
          const embedMatch = block.match(/(?:r:)?embed="([^"]+)"/i);
          if (!embedMatch) continue;
          const mediaPath = rels.get(embedMatch[1]);
          if (!mediaPath) continue;
          anchors.set(mediaPath, {
            excelRow: rowMatch ? Number(rowMatch[1]) + 1 : null,
            drawingPath
          });
        }
      }
      return anchors;
    }

    async function extractImagesFromXlsxBuffer(buffer) {
      const view = new DataView(buffer);
      let eocd = -1;
      for (let offset = view.byteLength - 22; offset >= 0 && offset > view.byteLength - 66000; offset -= 1) {
        if (view.getUint32(offset, true) === 0x06054b50) {
          eocd = offset;
          break;
        }
      }
      if (eocd < 0) return [];
      const entries = view.getUint16(eocd + 10, true);
      let cdOffset = view.getUint32(eocd + 16, true);
      const zipEntries = [];
      for (let index = 0; index < entries; index += 1) {
        if (view.getUint32(cdOffset, true) !== 0x02014b50) break;
        const method = view.getUint16(cdOffset + 10, true);
        const compressedSize = view.getUint32(cdOffset + 20, true);
        const fileNameLength = view.getUint16(cdOffset + 28, true);
        const extraLength = view.getUint16(cdOffset + 30, true);
        const commentLength = view.getUint16(cdOffset + 32, true);
        const localOffset = view.getUint32(cdOffset + 42, true);
        const fileName = zipReadString(view, cdOffset + 46, fileNameLength);
        cdOffset += 46 + fileNameLength + extraLength + commentLength;
        if (view.getUint32(localOffset, true) !== 0x04034b50) continue;
        const localNameLength = view.getUint16(localOffset + 26, true);
        const localExtraLength = view.getUint16(localOffset + 28, true);
        const dataOffset = localOffset + 30 + localNameLength + localExtraLength;
        const compressed = new Uint8Array(buffer.slice(dataOffset, dataOffset + compressedSize));
        const raw = method === 0 ? compressed : method === 8 ? await inflateZipBytes(compressed) : null;
        if (!raw) continue;
        zipEntries.push({ name: normalizeZipPath(fileName), raw });
      }
      const textEntries = new Map();
      zipEntries.forEach((entry) => {
        if (/\.(xml|rels)$/i.test(entry.name)) textEntries.set(entry.name, new TextDecoder().decode(entry.raw));
      });
      const anchors = extractDrawingImageAnchors(textEntries);
      const images = [];
      for (const entry of zipEntries) {
        const fileName = entry.name;
        if (!/^xl\/media\/.+\.(png|jpe?g|webp|gif|bmp)$/i.test(fileName)) continue;
        const ext = fileName.split(".").pop().toLowerCase();
        const mime = ext === "jpg" || ext === "jpeg" ? "image/jpeg" : ext === "webp" ? "image/webp" : ext === "gif" ? "image/gif" : ext === "bmp" ? "image/bmp" : "image/png";
        const name = fileName.split("/").pop();
        const file = new File([entry.raw], name, { type: mime });
        const anchor = anchors.get(fileName) || {};
        Object.defineProperty(file, "__excelRow", { value: anchor.excelRow || null, enumerable: false, configurable: true });
        Object.defineProperty(file, "__mediaPath", { value: fileName, enumerable: false, configurable: true });
        images.push(file);
      }
      return images;
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("File read failed"));
        reader.readAsDataURL(file);
      });
    }

    function loadImageFromDataUrl(dataUrl) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("Image could not be loaded."));
        image.src = dataUrl;
      });
    }

    async function preprocessImageForOcr(file) {
      const dataUrl = await fileToDataUrl(file);
      const image = await loadImageFromDataUrl(dataUrl);
      const scale = image.width < 900 ? 3 : 2;
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(image.width * scale);
      canvas.height = Math.round(image.height * scale);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
      for (let index = 0; index < pixels.data.length; index += 4) {
        const gray = pixels.data[index] * 0.299 + pixels.data[index + 1] * 0.587 + pixels.data[index + 2] * 0.114;
        const contrasted = Math.max(0, Math.min(255, (gray - 128) * 1.75 + 128));
        pixels.data[index] = contrasted;
        pixels.data[index + 1] = contrasted;
        pixels.data[index + 2] = contrasted;
      }
      ctx.putImageData(pixels, 0, 0);
      return canvas.toDataURL("image/png");
    }
