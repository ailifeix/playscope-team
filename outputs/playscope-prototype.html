<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PlayScope</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #fff;
      --soft: #f8fbfc;
      --ink: #172033;
      --muted: #667085;
      --line: #dbe3ea;
      --teal: #008b84;
      --teal-soft: #e2f6f4;
      --coral: #ff624d;
      --amber: #d9822b;
      --red: #b42318;
      --shadow: 0 16px 40px rgba(22, 35, 56, .08);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); overflow-x: hidden; }
    button, input, textarea, select { font: inherit; }
    button, select, input, textarea {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }
    button {
      min-height: 39px;
      padding: 9px 12px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    button:hover { transform: translateY(-1px); border-color: #b8ced6; }
    input, select, textarea { width: 100%; padding: 10px 11px; outline: none; }
    textarea { resize: vertical; min-height: 116px; }
    input:focus, select:focus, textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0, 139, 132, .12); }

    .app { display: grid; grid-template-columns: 242px minmax(0, 1fr); min-height: 100vh; width: 100%; max-width: 100vw; overflow-x: hidden; }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--line);
      padding: 25px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-size: 26px; font-weight: 850; }
    .mark {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--teal), #40c5ba);
      position: relative;
      box-shadow: 0 8px 20px rgba(0, 139, 132, .18);
    }
    .mark:before {
      content: "";
      position: absolute;
      inset: 7px 8px;
      border-left: 9px solid #fff;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }
    .nav, .sidebar-foot { display: flex; flex-direction: column; gap: 7px; }
    .nav button, .sidebar-foot button {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      border: 0;
      background: transparent;
      color: #344054;
      padding: 12px 13px;
      min-height: 43px;
      text-align: left;
    }
    .nav button.active, .sidebar-foot button.active {
      color: #fff;
      background: var(--teal);
      box-shadow: 0 12px 24px rgba(0, 139, 132, .18);
    }
    .icon { width: 17px; height: 17px; flex: 0 0 auto; }
    .profile { margin-top: auto; padding-top: 18px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
    .avatar, .person {
      border-radius: 50%;
      background: linear-gradient(135deg, #1f2937, #0d9488);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }
    .avatar { width: 38px; height: 38px; font-size: 13px; }
    .profile strong, .profile span { display: block; }
    .profile strong { font-size: 13px; }
    .profile span { font-size: 12px; color: var(--muted); margin-top: 2px; }

    main { min-width: 0; max-width: 100%; padding: 18px; display: grid; gap: 14px; align-content: start; overflow-x: hidden; }
    .brief, .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .brief {
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
    }
    .section-title { display: flex; align-items: center; gap: 10px; margin: 0 0 14px; font-size: 18px; line-height: 1.2; }
    .brief-grid { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 14px 26px; }
    .field-label { color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .field-value { font-size: 14px; font-weight: 650; min-height: 20px; }
    .top-actions { display: flex; gap: 8px; align-items: center; white-space: nowrap; }
    .language-select { width: 132px; }
    .primary { background: var(--teal); border-color: var(--teal); color: #fff; }
    .coral { background: var(--coral); border-color: var(--coral); color: #fff; }
    .ghost { background: var(--soft); }

    .page-head { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin: 2px 0 0; }
    .page-head h2 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .page-head p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .grid { display: grid; gap: 14px; }
    .grid.two { grid-template-columns: minmax(0, 1fr) 390px; align-items: start; }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.half { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .panel-head { padding: 16px 16px 13px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .panel-head h3 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 9px; }
    .panel-body { padding: 16px; }
    .controls { display: flex; gap: 8px; align-items: center; }
    .controls select, .controls input { width: 160px; padding: 9px 10px; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--teal-soft);
      color: #05746e;
      font-weight: 750;
      font-size: 12px;
      padding: 5px 8px;
    }
    .stat {
      padding: 16px;
      min-height: 116px;
    }
    .stat small { display: block; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .stat strong { display: block; font-size: 32px; color: var(--ink); }
    .stat span { color: var(--teal); font-size: 13px; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { color: #475467; font-size: 12px; font-weight: 750; text-align: left; padding: 12px 14px; background: #fbfcfd; border-bottom: 1px solid var(--line); }
    td { padding: 13px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    td.compact-cell { max-width: 210px; white-space: normal; overflow-wrap: anywhere; }
    .cell-muted { color: var(--muted); font-size: 12px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    tr[data-index] { cursor: pointer; }
    tr.selected { background: linear-gradient(90deg, rgba(0, 139, 132, .08), rgba(0, 139, 132, .02)); outline: 1px solid #9ed8d4; outline-offset: -1px; }
    .table-wrap {
      max-width: 100%;
      overflow: auto;
      max-height: calc(100vh - 310px);
      border-radius: 8px;
      scrollbar-gutter: stable;
    }
    .table-wrap thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .name-cell { display: flex; align-items: center; gap: 10px; min-width: 160px; }
    .person { width: 36px; height: 36px; }
    .name-cell strong { display: block; font-size: 13px; }
    .name-cell span { color: var(--muted); font-size: 12px; }
    .bar { width: 92px; height: 5px; border-radius: 999px; background: #e5eaf0; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 8px; }
    .bar span { display: block; height: 100%; border-radius: inherit; background: var(--teal); }
    .score { color: var(--teal); font-size: 21px; font-weight: 850; line-height: 1; }
    .score small { display: block; font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 700; }
    .tag { display: inline-flex; padding: 4px 7px; border-radius: 5px; border: 1px solid; font-size: 12px; font-weight: 750; }
    .tag.good { color: var(--teal); border-color: #78cbc6; background: #f0fbfa; }
    .tag.warn { color: var(--amber); border-color: #f0ba72; background: #fff8ed; }
    .tag.no { color: var(--red); border-color: #f2a6a0; background: #fff3f1; }
    .detail { padding: 18px; position: sticky; top: 18px; }
    .detail-top { display: flex; gap: 14px; align-items: center; margin-bottom: 17px; }
    .detail .person { width: 66px; height: 66px; font-size: 20px; }
    .detail h3 { margin: 0 0 6px; font-size: 18px; }
    .meta { display: grid; gap: 5px; color: #344054; font-size: 13px; }
    .analysis-list { margin: 12px 0 18px; padding: 0 0 0 18px; color: #344054; line-height: 1.65; font-size: 13px; }
    .analysis-list li::marker { color: var(--teal); }
    .fit-grid { display: grid; grid-template-columns: 95px 1fr; gap: 14px; align-items: center; margin: 12px 0 18px; }
    .big-score { font-size: 40px; line-height: 1; color: var(--teal); font-weight: 850; }
    .big-score span { color: var(--muted); font-size: 14px; font-weight: 650; }
    .metrics { display: grid; gap: 8px; }
    .metric { display: grid; grid-template-columns: 95px 1fr 30px; gap: 8px; align-items: center; font-size: 12px; color: #475467; }
    .outreach { background: linear-gradient(135deg, #e2f7f5, #fff); border: 1px solid #bae3df; border-radius: var(--radius); padding: 14px; font-size: 13px; line-height: 1.45; color: #344054; }
    .detail-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 14px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .note { color: var(--muted); font-size: 12px; line-height: 1.5; margin: 9px 0 0; }
    .result-box { background: var(--soft); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; min-height: 116px; line-height: 1.55; font-size: 14px; }
    .task-list { display: grid; gap: 10px; }
    .task { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .task strong { display: block; font-size: 13px; }
    .task span { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }
    .empty { text-align: center; padding: 18px; color: var(--muted); font-size: 13px; }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: sticky; top: 0; z-index: 2; max-width: 100vw; flex-direction: row; align-items: center; overflow-x: auto; padding: 12px; gap: 12px; }
      .sidebar { scrollbar-width: none; }
      .sidebar::-webkit-scrollbar { display: none; }
      .brand span { display: inline; font-size: 20px; }
      .nav, .sidebar-foot { flex-direction: row; }
      .nav button, .sidebar-foot button { justify-content: center; white-space: nowrap; }
      .profile { display: none; }
      .grid.two, .grid.three { grid-template-columns: 1fr; }
      .brief-grid { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
      .detail { position: static; }
    }
    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: sticky; top: 0; z-index: 2; max-width: 100vw; flex-direction: row; align-items: center; overflow-x: auto; padding: 12px; }
      .sidebar { scrollbar-width: none; }
      .sidebar::-webkit-scrollbar { display: none; }
      .brand span { display: inline; font-size: 20px; }
      .nav, .sidebar-foot { flex-direction: row; }
      .profile { display: none; }
      main { padding: 12px; }
      .brief, .page-head { grid-template-columns: 1fr; flex-direction: column; align-items: stretch; }
      .brief-grid, .grid.half, .form-grid { grid-template-columns: 1fr; }
      .top-actions, .controls { flex-wrap: wrap; }
      table { min-width: 760px; }
    }

    /* Premium purple interface pass. Keeps the existing app logic intact. */
    :root {
      --bg: #f7f3ff;
      --surface: #ffffff;
      --soft: #fbf8ff;
      --ink: #20152f;
      --muted: #756982;
      --line: #e4d9f3;
      --teal: #7c3aed;
      --teal-soft: #f0e7ff;
      --coral: #d946ef;
      --amber: #b56a22;
      --red: #b42318;
      --violet: #8b5cf6;
      --pink: #d946ef;
      --deep: #2b1746;
      --shadow: 0 18px 46px rgba(74, 39, 122, .13);
    }
    body {
      background:
        radial-gradient(circle at 20% 0%, rgba(217, 70, 239, .16), transparent 32%),
        linear-gradient(180deg, #fbf8ff 0%, var(--bg) 42%, #f4effc 100%);
    }
    button, select, input, textarea {
      border-color: var(--line);
    }
    button {
      font-weight: 750;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }
    button:hover {
      border-color: #c4b5fd;
      box-shadow: 0 8px 18px rgba(124, 58, 237, .08);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, .14);
    }
    .sidebar {
      background: linear-gradient(180deg, #2b1746 0%, #241239 54%, #1b102a 100%);
      border-right: 1px solid rgba(255,255,255,.12);
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .brand {
      color: #fff;
      padding: 4px 7px 12px;
      align-items: center;
    }
    .brand span {
      color: #fff;
      font-size: 24px;
      line-height: 1;
    }
    .mark {
      background: linear-gradient(135deg, #a78bfa, #f0abfc);
      box-shadow: 0 14px 30px rgba(124,58,237,.22);
    }
    .nav button,
    .sidebar-foot button {
      color: #d9cced;
      border-radius: 8px;
      min-height: 42px;
    }
    .nav button:hover,
    .sidebar-foot button:hover {
      background: rgba(255,255,255,.07);
      color: #fff;
      box-shadow: none;
    }
    .nav button.active,
    .sidebar-foot button.active {
      background: linear-gradient(135deg, rgba(167,139,250,.22), rgba(217,70,239,.16));
      color: #fff;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: none;
    }
    .profile {
      border-top-color: rgba(255,255,255,.13);
      background: rgba(255,255,255,.07);
      border-radius: 8px;
      padding: 12px;
      color: #fff;
    }
    .profile span {
      color: #c9b8e6;
    }
    .profile button {
      width: 100%;
      min-height: 54px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      box-shadow: none;
    }
    .profile button:hover {
      transform: none;
      border-color: transparent;
      box-shadow: none;
    }
    .account-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(22, 10, 36, .46);
      backdrop-filter: blur(10px);
    }
    .account-modal.open {
      display: grid;
    }
    .account-card {
      width: min(420px, 100%);
      background: linear-gradient(180deg, #fff, #fbf8ff);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 28px 80px rgba(43, 23, 70, .28);
      overflow: hidden;
    }
    .account-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .account-head h3 {
      margin: 0;
      font-size: 18px;
    }
    .account-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .account-body {
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    .account-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 4px;
    }
    .account-close {
      width: 34px;
      min-height: 34px;
      padding: 0;
      border-radius: 999px;
      background: #fff;
    }
    .avatar,
    .person {
      background: linear-gradient(135deg, #6d28d9, #d946ef);
      color: #fff;
    }
    .brief {
      background: linear-gradient(135deg, rgba(255,255,255,.94), rgba(250,245,255,.9));
      border-color: var(--line);
      position: relative;
      overflow: hidden;
    }
    .brief:after {
      content: "";
      position: absolute;
      right: -80px;
      top: -90px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(217,70,239,.18), transparent 68%);
      pointer-events: none;
    }
    .brief > * {
      position: relative;
      z-index: 1;
    }
    .section-title {
      font-size: 22px;
      color: var(--ink);
    }
    .brief-grid {
      gap: 10px;
    }
    .brief-grid > div {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbf8ff);
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }
    .field-label {
      color: var(--muted);
      font-size: 11px;
    }
    .field-value {
      color: var(--ink);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .primary {
      background: linear-gradient(135deg, #7c3aed, #c026d3);
      border-color: #8b5cf6;
      color: #fff;
      box-shadow: 0 10px 22px rgba(124,58,237,.18);
    }
    .coral {
      background: linear-gradient(135deg, #d946ef, #f472b6);
      border-color: #f0abfc;
      color: #fff;
    }
    .ghost {
      background: #fff;
      color: #4b3b5f;
    }
    .panel {
      background: rgba(255,255,255,.92);
      border-color: var(--line);
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .panel:hover {
      box-shadow: 0 20px 48px rgba(74, 39, 122, .16);
    }
    .panel-head {
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(251,248,255,.68));
      border-bottom-color: var(--line);
    }
    .panel-head h3,
    .page-head h2 {
      color: var(--ink);
    }
    .page-head p,
    .note,
    .cell-muted,
    .muted,
    .task span {
      color: var(--muted);
    }
    .stat {
      background: linear-gradient(135deg, #ffffff, #f7edff);
    }
    .stat strong {
      color: var(--ink);
    }
    .stat span,
    .score,
    .big-score {
      color: var(--teal);
    }
    th {
      background: #fbf8ff;
      color: #536172;
      border-bottom-color: var(--line);
    }
    td {
      border-bottom-color: var(--line);
    }
    tbody tr {
      transition: background .16s ease;
    }
    tbody tr:hover {
      background: rgba(124,58,237,.045);
    }
    tr.selected {
      background: linear-gradient(90deg, rgba(124, 58, 237, .10), rgba(217, 70, 239, .04));
      outline: 1px solid #c4b5fd;
    }
    .bar {
      background: #eee7f8;
    }
    .bar span {
      background: linear-gradient(90deg, #7c3aed, #d946ef);
    }
    .tag.good,
    .pill {
      color: #6d28d9;
      background: #f4ecff;
      border-color: #c4b5fd;
    }
    .tag.warn {
      color: var(--amber);
      background: #fff8ed;
      border-color: #f0bb78;
    }
    .tag.no {
      color: var(--red);
      background: #fff7f5;
      border-color: #f1b8b2;
    }
    .result-box,
    .outreach,
    .task {
      background: linear-gradient(180deg, #fff, #fbf8ff);
      border-color: var(--line);
    }
    .outreach {
      color: #4b3b5f;
    }
    .detail {
      background: rgba(255,255,255,.92);
    }
    .analysis-list li::marker {
      color: var(--teal);
    }
    @media (max-width: 1180px) {
      .sidebar {
        height: auto;
      }
      .brand span {
        font-size: 20px;
      }
    }
    @media (max-width: 760px) {
      .top-actions button {
        width: 100%;
      }
    }

    /* Compact data-table pass for dense influencer lists. */
    .app {
      grid-template-columns: 218px minmax(0, 1fr);
    }
    .sidebar {
      padding: 16px 10px;
      gap: 14px;
    }
    .brand span {
      font-size: 20px;
    }
    main {
      padding: 12px;
      gap: 10px;
    }
    .brief {
      padding: 12px 14px;
    }
    .brief-grid {
      grid-template-columns: repeat(5, minmax(92px, 1fr));
    }
    .brief-grid > div {
      padding: 8px;
    }
    .section-title {
      font-size: 19px;
      margin-bottom: 10px;
    }
    .page-head h2 {
      font-size: 20px;
    }
    .page-head p {
      font-size: 12px;
    }
    .panel-head {
      padding: 10px 12px;
    }
    .panel-head h3 {
      font-size: 15px;
    }
    .panel-body {
      padding: 10px;
    }
    .table-wrap {
      max-height: calc(100vh - 250px);
    }
    table {
      font-size: 11.5px;
      min-width: 1260px;
    }
    th {
      font-size: 10.5px;
      padding: 8px 9px;
      line-height: 1.2;
    }
    td {
      padding: 8px 9px;
      line-height: 1.25;
    }
    .name-cell {
      min-width: 132px;
      gap: 8px;
    }
    .person {
      width: 31px;
      height: 31px;
      font-size: 11px;
    }
    td.compact-cell {
      max-width: 142px;

      const ranges = ageText.match(/\d{1,2}\s*[-–]\s*\d{1,2}\s*:?\s*\d+(?:\.\d+)?%/g) || [];
      if (ageSegments.length) ageText = ageSegments.join("; ");
      else if (ranges.length) ageText = ranges.map((range) => {
        const match = range.match(/(\d{1,2})\s*[-–]\s*(\d{1,2})\s*:?\s*(\d+(?:\.\d+)?)%/);
        return match ? `${match[1]}-${match[2]}: ${match[3]}%` : range;
      }).join("; ");
      else if (avg) ageText = avg[0].replace(/^~/, "").trim();
      return { age: ageText || "Missing", gender: genderText || "Missing" };
    }
    function normalizeInfluencer(item) {
      const genres = item.genres || [];
      const category = item.category || "Unclear";
      const demographics = splitAgeGender(item.age, item.gender);
      return {
        ...item,
        link: item.link || "",
        geo: item.geo || item.country || "-",
        category,
        subcategory: cleanSubcategory(item.subcategory || genres.join(" / ") || "Needs YouTube API analysis", category),
        subscribers: item.subscribers || item.audience || "-",
        gender: demographics.gender,
        age: demographics.age,
        demographicsSource: item.demographicsSource || (item.gender || item.age ? "Visible/imported" : "Missing"),
        avgComments: item.avgComments || 0,
        format: item.format || "-",
        duration: item.duration || "-",
        keywords: item.keywords || genres.join(", "),
        comments: item.comments || item.notes || ""
      };
    }
    state.influencers = (state.influencers || []).map(normalizeInfluencer);
    function unavailableDemo(value) { return !value || value === "Missing" || value === "-" || value === "Unknown"; }
    function demoValue(value) { return unavailableDemo(value) ? "Free data yok" : value; }
    function views(value) {
      const num = Number(value || 0);
      if (!num) return "-";
      return num >= 1000000 ? (num / 1000000).toFixed(1) + "M" : num >= 1000 ? Math.round(num / 1000) + "K" : String(num);
    }
    function parseYouTubeDuration(value) {
      const match = String(value || "").match(/^PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/);
      if (!match) return 0;
      return Number(match[1] || 0) * 3600 + Number(match[2] || 0) * 60 + Number(match[3] || 0);
    }
    function formatAverageDuration(seconds) {
      const total = Math.round(Number(seconds || 0));
      if (!total) return "-";
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const secs = total % 60;
      if (hours) return `${hours}h${String(minutes).padStart(2, "0")}m`;
      if (minutes) return `${minutes}m${String(secs).padStart(2, "0")}s`;
      return `${secs}s`;
    }
    function youtubeVideoKind(video) {
      const seconds = parseYouTubeDuration(video.contentDetails?.duration);
      const text = [video.snippet?.title, video.snippet?.description, ...(video.snippet?.tags || [])].join(" ").toLowerCase();
      const vodSignal = /\b(vod|canli|canlı|live|livestream|stream|yayın|yayin|full yayın|full yayin|twitch)\b/i.test(text);
      if (seconds > 0 && seconds < 60) return "Short video";
      if (vodSignal || seconds >= 2700) return "VOD / Live replay";
      if (seconds >= 180 && seconds <= 2400) return "Edited long video";
      if (seconds >= 60 && seconds < 180) return "Short edited video";
      if (seconds > 2400) return "Long video";
      return "Latest YouTube video";
    }
    function dominantVideoFormat(videoItems = []) {
      const counts = new Map();
      videoItems.forEach((video) => {
        const kind = youtubeVideoKind(video);
        counts.set(kind, (counts.get(kind) || 0) + 1);
      });
      const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]);
      if (!sorted.length) return "Latest YouTube videos";
      if (sorted.length > 1 && sorted[0][1] === sorted[1][1]) return `${sorted[0][0]} + ${sorted[1][0]}`;
      return sorted[0][0];
    }
    function averageCreatorDuration(videoItems = []) {
      const rows = videoItems
        .map((item) => ({ seconds: parseYouTubeDuration(item.contentDetails?.duration), kind: youtubeVideoKind(item) }))
        .filter((item) => Number.isFinite(item.seconds) && item.seconds > 0);
      if (!rows.length) return 0;
      const normalVideos = rows
        .filter((item) => item.seconds >= 180 && item.seconds <= 2400 && item.kind !== "VOD / Live replay")
        .map((item) => item.seconds);
      const editedLong = rows.filter((item) => item.kind === "Edited long video").map((item) => item.seconds);
      const shortEdited = rows.filter((item) => item.kind === "Short edited video").map((item) => item.seconds);
      const shorts = rows.filter((item) => item.kind === "Short video").map((item) => item.seconds);
      const vods = rows.filter((item) => item.kind === "VOD / Live replay").map((item) => item.seconds);
      const otherLong = rows.filter((item) => item.kind === "Long video").map((item) => item.seconds);
      let source = normalVideos.length >= 2 ? normalVideos : editedLong.length >= 2 ? editedLong : shortEdited.length >= 3 ? shortEdited : shorts.length >= 3 ? shorts : otherLong.length >= 2 ? otherLong : rows.map((item) => item.seconds);
      if (source !== vods && source.length < 2 && vods.length && rows.length === vods.length) source = vods;
      const sorted = [...source].sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)] || sorted[0];
      const noOutliers = sorted.length >= 4
        ? sorted.filter((value) => !(median <= 1800 && value > Math.max(2700, median * 1.8)))
        : sorted;
      const trimmed = noOutliers.length >= 5 ? noOutliers.slice(1, -1) : noOutliers;
      return Math.round(trimmed.reduce((sum, value) => sum + value, 0) / trimmed.length);
    }
    function latestMetricVideos(videoItems = []) {
      const ordered = [...videoItems].sort((a, b) => {
        const at = Date.parse(a.snippet?.publishedAt || "") || 0;
        const bt = Date.parse(b.snippet?.publishedAt || "") || 0;
        return bt - at;
      });
      return ordered.slice(0, Math.min(10, Math.max(5, ordered.length)));
    }
    function estimateDemographics(item = {}) {
      const text = [item.category, item.subcategory, ...(item.genres || [])].join(" ").toLowerCase();
      const geo = String(item.geo || item.country || "").toUpperCase();
      let male = 72;
      if (text.includes("horror")) male = 58;
      if (text.includes("food") || text.includes("travel") || text.includes("mukbang")) male = 50;
      if (text.includes("beauty") || text.includes("fashion")) male = 25;
      if (text.includes("strategy") || text.includes("esport") || text.includes("fps")) male = 82;
      if (geo.includes("TR") && text.includes("gaming")) male += 4;
      male = Math.max(20, Math.min(90, male));
      const female = 100 - male;
      let age = "18-24: 42%; 25-34: 30%; 35-44: 10%";
      if (text.includes("horror")) age = "18-24: 45%; 25-34: 25%; 35-44: 8%";
      if (text.includes("strategy")) age = "18-24: 32%; 25-34: 38%; 35-44: 14%";
      if (text.includes("food") || text.includes("travel")) age = "18-24: 28%; 25-34: 36%; 35-44: 18%";
      return { gender: `M${male}% / F${female}%`, age };

    function esc(value) { return String(value).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

    function storeApiTargets() {
      const published = "https://playscope-team.onrender.com";
      if (location.protocol === "file:") return ["http://127.0.0.1:5184", "http://127.0.0.1:5183", "http://127.0.0.1:5182", "http://127.0.0.1:5180", published];
      if (location.hostname === "127.0.0.1" || location.hostname === "localhost") return ["", "http://127.0.0.1:5184", "http://127.0.0.1:5183", "http://127.0.0.1:5182", "http://127.0.0.1:5180", published];
      return ["", published];
    }

    async function fetchStoreApi(path, payload) {
      const errors = [];
      for (const target of storeApiTargets()) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 12000);
        try {
          const response = await fetch(`${target}${path}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            signal: controller.signal,
            body: JSON.stringify(payload)
          });
          clearTimeout(timeout);
          if (response.status === 404) {
            errors.push(`${target || "local"}: not found`);
            continue;
          }
          const text = await response.text();
          let result;
          try {
            result = JSON.parse(text);
          } catch (parseError) {
            errors.push(`${target || "local"}: invalid response`);
            continue;
          }
          if (result.ok && result.results?.length) return result;
          errors.push(result.error || `${target || "local"}: no results`);
        } catch (error) {
          clearTimeout(timeout);
          errors.push(error.name === "AbortError" ? `${target || "local"} timed out` : error.message);
        }
      }
      throw new Error(errors.filter(Boolean).slice(-2).join(" / ") || "Store search failed.");
    }

    async function searchStoreCompetitors(store) {
      const status = $("googlePlayStatus");
      const button = store === "app-store" ? $("appStoreSearchBtn") : $("googlePlaySearchBtn");
      const label = store === "app-store" ? "App Store" : "Google Play";
      state.googlePlayQuery = $("gpQuery").value.trim();
      state.googlePlayLang = $("gpLang").value;
      if (!state.googlePlayQuery) {
        if (status) status.textContent = "Write a game name or genre first.";
        return;
      }
      state.googlePlayResults = [];
      state.competitorStore = store === "app-store" ? "App Store" : "Google Play";
      state.selectedCompetitor = 0;
      if (status) status.textContent = `Searching ${label}...`;
      if (button) {
        button.disabled = true;
        button.textContent = "Searching...";
      }
      try {
        if (store === "google-play") {
          try {
            const serpResults = await directSerpApiGooglePlaySearch(state.googlePlayQuery, state.googlePlayLang);
            if (serpResults.length) {
              state.googlePlayResults = serpResults;
              state.competitorStore = "Google Play";
              state.selectedCompetitor = 0;
              saveState();
              render();
              return;
            }
          } catch (serpError) {
            if (status) status.textContent = "Trying Google Play backend search...";
          }
        }
        if (store === "app-store") {
          try {
            const directResults = await directAppStoreSearch(state.googlePlayQuery, state.googlePlayLang);
            if (directResults.length) {
              state.googlePlayResults = directResults;
              state.competitorStore = "App Store";
              state.selectedCompetitor = 0;
              saveState();
              render();
              return;
            }
          } catch (directError) {
            if (status) status.textContent = "Trying App Store backend search...";
          }
        }
        const result = await fetchStoreApi(store === "app-store" ? "/api/app-store-search" : "/api/google-play-search", { query: state.googlePlayQuery, lang: state.googlePlayLang, limit: 5 });
        state.googlePlayResults = result.results;
        state.competitorStore = store === "app-store" ? "App Store" : "Google Play";
        state.selectedCompetitor = 0;
        saveState();
        render();
      } catch (error) {
        const message = error.name === "AbortError" ? `${label} did not answer in time. Try once more.` : error.message;
        if (status) {
          if (store === "google-play" && /fetch failed|Failed to fetch|network|parser is not installed|Could not connect|SerpAPI key is missing/i.test(message)) {
            status.textContent = "Google Play needs SerpAPI. Add the key in Settings, save it, then search again.";
          } else {
            status.textContent = `${label} search failed: ${message}`;
          }
        }
        saveState();
        setTimeout(() => {
          const stillStatus = $("googlePlayStatus")?.textContent || "";
          render();
          const nextStatus = $("googlePlayStatus");
          if (nextStatus && stillStatus) nextStatus.textContent = stillStatus;
        }, 0);
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = store === "app-store" ? "Search App Store" : "Search Google Play";
        }
      }
    }

    function storeCountryFromLang(lang) {
      if (lang === "tr") return "TR";
      if (lang === "de") return "DE";
      if (lang === "ja") return "JP";
      if (lang === "zh") return "CN";
      return "US";
    }

    async function loadSerpApiKey() {
      if (state.api?.serpapi) return state.api.serpapi;
      const stored = localStorage.getItem("playscope-serpapi-key") || "";
      if (stored) {
        state.api = state.api || {};
        state.api.serpapi = stored;
        saveState();
        return stored;
      }
      try {
        const response = await fetchTeamApi("/api/client-config");
        const config = await response.json();
        if (config.serpapiKey) {
          state.api = state.api || {};
          state.api.serpapi = config.serpapiKey;
          localStorage.setItem("playscope-serpapi-key", config.serpapiKey);
          saveState();
          return config.serpapiKey;
        }
      } catch (error) {}
      const typed = prompt("SerpAPI Key");
      if (typed && typed.trim()) {
        const key = typed.trim();
        state.api = state.api || {};
        state.api.serpapi = key;
        localStorage.setItem("playscope-serpapi-key", key);
        saveState();
        return key;
      }
      return "";
    }

    function mapSerpGooglePlayItem(item) {
      const title = item.title || item.name || item.app_name || item.product_title || "Google Play app";
      const appId = item.product_id || item.app_id || item.appId || item.package_name || "";
      const description = item.description || item.snippet || item.summary || "";
      const category = item.category || item.genre || "";
      return {
        id: appId || title,
        name: title,
        store: "Google Play",
        length: String(description.length || "-"),
        message: clientFirstSentence(description) || category || "Google Play result loaded",
        strength: "SerpAPI Google Play",
        desc: description || "Description was not included in this result.",
        keywords: clientKeywords(`${title} ${item.author || ""} ${category} ${description}`),
        meta: [item.author, item.rating ? `Rating ${item.rating}` : "", item.downloads ? `${item.downloads} downloads` : "", category].filter(Boolean).join(" · "),
        url: item.link || item.store_link || item.serpapi_link || (appId ? `https://play.google.com/store/apps/details?id=${encodeURIComponent(appId)}` : "")
      };
    }

    function flattenSerpResults(data) {
      const buckets = [data.organic_results, data.app_highlight, data.results, data.items_highlight, data.ads_results].filter(Boolean);
      const flat = [];
      buckets.forEach((bucket) => {
        (Array.isArray(bucket) ? bucket : [bucket]).forEach((item) => {
          if (Array.isArray(item.items)) flat.push(...item.items);
          else if (Array.isArray(item.apps)) flat.push(...item.apps);
          else if (Array.isArray(item.items_highlight)) item.items_highlight.flat().forEach((entry) => flat.push(entry));
          else flat.push(item);
        });
      });
      const seen = new Set();
      return flat.filter((item) => {
        const key = item.product_id || item.app_id || item.package_name || item.title || item.name;
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    async function directSerpApiGooglePlaySearch(query, lang) {
      const key = await loadSerpApiKey();
      if (!key) throw new Error("SerpAPI key is missing.");
      const url = `https://serpapi.com/search.json?engine=google_play&store=apps&q=${encodeURIComponent(query)}&hl=${encodeURIComponent(lang || "en")}&gl=us&api_key=${encodeURIComponent(key)}`;
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 20000);
      const response = await fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timeout));
      if (!response.ok) throw new Error(`SerpAPI HTTP ${response.status}`);
      const text = await response.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (error) {
        throw new Error(`SerpAPI returned non-JSON response: ${text.replace(/\s+/g, " ").slice(0, 120)}`);
      }
      if (data.error) throw new Error(data.error);
      return flattenSerpResults(data).slice(0, 5).map(mapSerpGooglePlayItem);
    }

    function clientKeywords(text) {
      const stop = new Set("the and for with you your our are this that from into game play apps app mobile free new now all can will get more best build create games".split(" "));
      const counts = {};
      String(text || "").toLowerCase().match(/[a-z][a-z0-9-]{2,}/g)?.forEach((word) => {
        if (!stop.has(word)) counts[word] = (counts[word] || 0) + 1;
      });
      return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10).map(([word]) => word).join(", ");
    }

    function clientFirstSentence(text) {
      const sentence = String(text || "").split(/(?<=[.!?])\s+/)[0] || "";
      return sentence.length > 130 ? `${sentence.slice(0, 127)}...` : sentence;
    }

    async function directAppStoreSearch(query, lang) {
      const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=software&country=${storeCountryFromLang(lang)}&limit=5`;
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 20000);
      const response = await fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timeout));
      if (!response.ok) throw new Error(`App Store HTTP ${response.status}`);
      const data = await response.json();
      return (data.results || []).map((item) => {
        const description = item.description || "";
        const title = item.trackName || item.bundleId || "App Store app";
        return {
          id: String(item.trackId || item.bundleId || title),
          name: title,
          store: "App Store",
          length: String(description.length || "-"),
          message: clientFirstSentence(description) || item.primaryGenreName || "App Store description loaded",
          strength: "App Store public data",
          desc: description || "Description could not be read from App Store.",
          keywords: clientKeywords(`${title} ${item.primaryGenreName || ""} ${(item.genres || []).join(" ")} ${description}`),
          url: item.trackViewUrl || ""
        };
      });
    }

    async function youtubeFromBrowser(input, apiKey) {
      try {
        const lookup = parseYouTubeLookup(input.name || "");
        let channelId = lookup.channelId;
        let searchTitle = "";
        if (!channelId && lookup.handle) {
          const handleCandidates = [...new Set([lookup.handle.replace(/^@/, ""), lookup.handle])];
          for (const handleCandidate of handleCandidates) {
            const handleUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${encodeURIComponent(handleCandidate)}&key=${encodeURIComponent(apiKey)}`;
            const handleResponse = await fetch(handleUrl);
            const handleData = await handleResponse.json();
            if (handleResponse.ok && handleData.items?.[0]) {
              channelId = handleData.items[0].id;
              break;
            }
          }
        }
        if (!channelId) {
          const query = encodeURIComponent(lookup.query);
          const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&maxResults=1&q=${query}&key=${encodeURIComponent(apiKey)}`;
          const searchResponse = await fetch(searchUrl);
          const search = await searchResponse.json();
          if (!searchResponse.ok) {
            const reason = search.error?.errors?.[0]?.reason || search.error?.message || `HTTP ${searchResponse.status}`;
            return { ...localResearchResult(input), notes: `YouTube API error from browser: ${reason}` };
          }
          channelId = search.items?.[0]?.snippet?.channelId;
          searchTitle = search.items?.[0]?.snippet?.title || "";
        }
        if (!channelId) return { ...localResearchResult(input), notes: "No YouTube channel found. Try exact channel name, channel URL, channel ID, or @handle." };

        const channelUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${encodeURIComponent(apiKey)}`;
        const channelResponse = await fetch(channelUrl);
        const channelData = await channelResponse.json();
        if (!channelResponse.ok || !channelData.items?.[0]) {
          const reason = channelData.error?.errors?.[0]?.reason || channelData.error?.message || `HTTP ${channelResponse.status}`;
          return { ...localResearchResult(input), notes: `YouTube API error from browser: ${reason}` };
        }
        const channel = channelData.items[0];
        const videoSearchUrl = `https://www.googleapis.com/youtube/v3/search?part=id&channelId=${channelId}&order=date&type=video&maxResults=10&key=${encodeURIComponent(apiKey)}`;
        const videoSearch = await fetch(videoSearchUrl).then((res) => res.json()).catch(() => ({ items: [] }));
        const videoIds = (videoSearch.items || []).map((item) => item.id?.videoId).filter(Boolean);
        let avgViews = 0;
        let avgComments = 0;
        let avgDurationSeconds = 0;
        let videoItems = [];
        let metricVideoCount = 0;
        let metricVideos = [];
        if (videoIds.length) {
          const videosUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${videoIds.join(",")}&key=${encodeURIComponent(apiKey)}`;
          const videoData = await fetch(videosUrl).then((res) => res.json()).catch(() => ({ items: [] }));
          videoItems = videoData.items || [];
          metricVideos = latestMetricVideos(videoItems);
          metricVideoCount = metricVideos.length;
          const counts = metricVideos.map((item) => Number(item.statistics?.viewCount || 0)).filter(Boolean);
          if (counts.length) avgViews = Math.round(counts.reduce((sum, value) => sum + value, 0) / counts.length);
          const commentCounts = metricVideos.map((item) => Number(item.statistics?.commentCount || 0)).filter((value) => Number.isFinite(value));
          if (commentCounts.length) avgComments = Math.round(commentCounts.reduce((sum, value) => sum + value, 0) / commentCounts.length);
          avgDurationSeconds = averageCreatorDuration(metricVideos);
        }
        const totalViews = Number(channel.statistics?.viewCount || 0);
        const subscribers = channel.statistics?.hiddenSubscriberCount ? "hidden" : (channel.statistics?.subscriberCount || "unknown");
        const videoContentText = videoItems.map((video) => [video.snippet?.title, video.snippet?.description, ...(video.snippet?.tags || [])].join(" ")).join(" ");
        const contentText = [
          channel.snippet?.title,
          channel.snippet?.description,
          videoContentText
        ].join(" ");
        const ruleClassification = mergeClassifications(
          classifyCreatorContent(contentText),
          classifyYouTubeVideoSet(videoItems, videoContentText)
        );
        const classification = await classifyCreatorContentWithGPT(channel, videoItems, ruleClassification);
        const keywords = (classification.keywords?.length ? classification.keywords : extractKeywords(contentText)).join(", ");
        const genres = classification.genres.length ? classification.genres : extractKeywords(contentText).slice(0, 5);
        const evidenceText = classification.evidence?.length ? ` Evidence: ${classification.evidence.slice(0, 3).join(" | ")}.` : "";
        const videoFormat = dominantVideoFormat(metricVideos.length ? metricVideos : videoItems);
        return {
          source: "youtube-live",
          name: channel.snippet?.title || input.name,
          handle: "@" + (channel.snippet?.customUrl || channel.snippet?.title || input.name || "creator").replace(/^@/, "").toLowerCase().replace(/[^a-z0-9_.-]/g, ""),
          country: input.country || channel.snippet?.country || "Unknown",
          geo: input.country ? `${input.country}` : (channel.snippet?.country || "Unknown"),
          category: classification.category,
          subcategory: classification.subcategory,
          subscribers: subscribers === "hidden" ? "hidden" : views(Number(subscribers)),
          gender: "Missing",
          age: "Missing",
          avgComments,
          flag: input.country === "Germany" ? "DE" : input.country === "USA" ? "US" : "TR",
          channel: "YouTube",
          link: `https://www.youtube.com/channel/${channelId}`,
          views: avgViews || Number(input.views) || 0,
          match: classification.confidence,
          format: videoFormat,
          duration: formatAverageDuration(avgDurationSeconds),
          keywords,
          comments: `Matched channel: ${channel.snippet?.title || searchTitle || input.name}. Latest ${metricVideoCount || videoIds.length} videos used for averages. Avg comments: ${views(avgComments)}. Category source: ${classification.source}.${evidenceText}`,
          genres,
          tone: "youtube live",
          audience: `${subscribers} subscribers`,
          notes: `Live YouTube data loaded. Category: ${classification.category} / ${classification.subcategory}. Matched channel: ${channel.snippet?.title || searchTitle || input.name}. Latest ${metricVideoCount || videoIds.length} video average views: ${avgViews ? views(avgViews) : "unavailable"}. Avg comments: ${views(avgComments)}. Avg duration: ${formatAverageDuration(avgDurationSeconds)}. Total channel views: ${views(totalViews)}. Videos checked: ${videoIds.length}. ${classification.reason}${evidenceText}`,
          shortlisted: false,
          note: ""
        };
      } catch (error) {
        return { ...localResearchResult(input), notes: `Browser YouTube request failed: ${error.message}` };
      }
    }

    function parseYouTubeLookup(raw) {
      const value = String(raw || "").trim();
      const channelMatch = value.match(/youtube\.com\/channel\/(UC[\w-]{20,})/i) || value.match(/\b(UC[\w-]{20,})\b/);
      if (channelMatch) return { channelId: channelMatch[1], query: value };
      const handleMatch = value.match(/youtube\.com\/@([A-Za-z0-9._-]+)/i) || value.match(/^@([A-Za-z0-9._-]+)$/);
      if (handleMatch) return { handle: "@" + handleMatch[1], query: handleMatch[1] };
      const videoMatch = value.match(/[?&]v=([A-Za-z0-9_-]{6,})/i) || value.match(/youtu\.be\/([A-Za-z0-9_-]{6,})/i);
      if (videoMatch) return { videoId: videoMatch[1], query: value };
      return { query: value };
    }

    async function channelIdFromVideo(videoId, apiKey) {
      if (!videoId) return "";
      const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${encodeURIComponent(videoId)}&key=${encodeURIComponent(apiKey)}`;
      const response = await fetch(url);
      const data = await response.json();
      if (!response.ok) return "";
      return data.items?.[0]?.snippet?.channelId || "";
    }

    function extractKeywords(textValue) {
      const stop = new Set(["youtube", "official", "channel", "video", "videos", "gaming", "game", "games", "the", "and", "for", "with", "from", "this", "that", "bir", "ile", "icin", "i莽in", "ve", "veya"]);
      const words = String(textValue || "")
        .toLowerCase()
        .replace(/https?:\/\/\S+/g, " ")
        .replace(/[^\p{L}\p{N}\s#@-]/gu, " ")
        .split(/\s+/)
        .map((word) => word.replace(/^#/, ""))
        .filter((word) => word.length > 2 && !stop.has(word));
      const counts = new Map();
      words.forEach((word) => counts.set(word, (counts.get(word) || 0) + 1));
      return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 10).map(([word]) => word);
    }

      const groups = [

        { category: "Gaming", subcategory: "Gameplay / Let's Play", tags: ["gameplay", "lets play", "let's play", "walkthrough", "playthrough", "oynuyoruz", "bölüm", "part"] },

        { category: "Music", subcategory: "Music / Performance", tags: ["music", "song", "cover", "official video", "lyrics", "remix", "şarkı", "müzik"] }
      ];
      const scored = groups.map((group) => ({
        ...group,
        score: group.tags.reduce((sum, tag) => sum + (text.includes(tag) ? 1 : 0), 0)
      })).sort((a, b) => b.score - a.score);
      const best = scored[0];
      const gamingSignal = /\b(gaming|gameplay|oyun|oyuncu|oynuyoruz|gamer|steam|twitch|playstation|xbox|nintendo|fps|rpg|minecraft|roblox|valorant|fortnite|pubg)\b/i.test(text);

        category: best.category,

    }

    function scoreVideoAgainstProfiles(video, position = 0) {
      const title = String(video.snippet?.title || "").toLowerCase();
      const description = String(video.snippet?.description || "").toLowerCase();
      const tags = (video.snippet?.tags || []).join(" ").toLowerCase();
      const ytCategory = youtubeCategoryName(video.snippet?.categoryId);
      const recencyWeight = Math.max(0.65, 1.2 - position * 0.06);
      return contentProfiles().map((profile) => {
        let score = profile.yt.includes(ytCategory) ? 2.4 : 0;
        const evidence = [];
        profile.words.forEach((word) => {
          const needle = word.toLowerCase();
          if (title.includes(needle)) { score += 4; evidence.push(`title:${word}`); }
          if (tags.includes(needle)) { score += 3; evidence.push(`tag:${word}`); }
          if (description.includes(needle)) { score += 1; evidence.push(`desc:${word}`); }
        });
        return { ...profile, score: score * recencyWeight, evidence, ytCategory };
      }).sort((a, b) => b.score - a.score)[0];
    }

    function classifyYouTubeVideoSet(videoItems = [], textValue = "") {
      if (!videoItems.length) {
        return {
          category: "Unclear",
          subcategory: "Needs manual content review",
          confidence: 40,
          genres: [],
          reason: "No latest videos were available for video-level classification.",
          source: "YouTube video-level metadata"
        };
      }
      const counts = new Map();
      videoItems.forEach((video) => {
        const name = youtubeCategoryName(video.snippet?.categoryId);
        counts.set(name, (counts.get(name) || 0) + 1);
      });
      const top = [...counts.entries()].sort((a, b) => b[1] - a[1])[0] || ["Unknown", 0];
      const profileScores = new Map();
      const profileEvidence = new Map();
      videoItems.forEach((video, index) => {
        const best = scoreVideoAgainstProfiles(video, index);
        if (!best || best.score < 2.2) return;
        const key = `${best.category}|||${best.subcategory}`;
        profileScores.set(key, (profileScores.get(key) || 0) + best.score);
        const title = String(video.snippet?.title || "").slice(0, 80);
        profileEvidence.set(key, [...(profileEvidence.get(key) || []), title]);
      });
      const sortedProfiles = [...profileScores.entries()].sort((a, b) => b[1] - a[1]);
      const profileWinner = sortedProfiles[0];
      if (profileWinner && profileWinner[1] >= Math.max(6, videoItems.length * 1.15)) {
        let [category, subcategory] = profileWinner[0].split("|||");
        const runnerUp = sortedProfiles[1];
        if (runnerUp) {
          const [runnerCategory] = runnerUp[0].split("|||");
          if (category === "Gaming" && runnerCategory === "Gaming" && runnerUp[1] >= profileWinner[1] * 0.72) {
            subcategory = "Variety Gaming / Mixed Games";
          }
        }
        const evidenceTitles = (profileEvidence.get(profileWinner[0]) || []).slice(0, 3);
        return {
          category,
          subcategory,
          confidence: Math.max(62, Math.min(93, Math.round(56 + profileWinner[1] * 2.8))),
          genres: extractKeywords([category, subcategory, ...evidenceTitles].join(" ")).slice(0, 8),
          reason: `Latest videos were classified one by one using title/tag/description weights. Strongest pattern: ${subcategory}. Evidence videos: ${evidenceTitles.join(" | ") || "latest video metadata"}.`,
          source: "weighted latest-video analysis"
        };
      }
      const text = String(textValue || "").toLowerCase();
      const seriesSignal = /\b(dizi|series|episode|bölüm|bolum|fragman|season|netflix|drama|sahne|scene)\b/i.test(text);
      const movieSignal = /\b(movie|film|cinema|sinema|official trailer|full movie|short film|trailer|teaser)\b/i.test(text);
      const animeSignal = /\b(anime|animation|animated|cartoon|manga|animasyon)\b/i.test(text);
      const comedySignal = /\b(comedy|komedi|sketch|stand up|standup|parody|şaka|saka)\b/i.test(text);
      const vlogSignal = /\b(vlog|daily vlog|lifestyle|routine|alışveriş|alisveris|travel vlog)\b/i.test(text);
      const educationSignal = /\b(education|educational|ders|tutorial|explained|öğren|ogren|anlatım|anlatim)\b/i.test(text);
      const techSignal = /\b(tech|technology|gadget|telefon|laptop|software|pc build|unboxing|review)\b/i.test(text);
      const newsSignal = /\b(news|haber|politics|politika|gündem|gundem|son dakika)\b/i.test(text);
      const gameplaySignal = /\b(gameplay|lets play|let's play|walkthrough|playthrough|oynuyoruz|valorant|fortnite|pubg|minecraft|roblox|cs2|counter strike|steam|xbox|playstation|nintendo|mobile legends|brawl stars|clash royale)\b/i.test(text);
      if (animeSignal && !gameplaySignal) {
        return { category: "Entertainment", subcategory: "Anime / Animation", confidence: 86, genres: ["entertainment", "anime", "animation"], reason: "Latest videos look like anime or animation content rather than gameplay.", source: "YouTube latest video metadata" };
      }
      if (movieSignal && !gameplaySignal) {
        return { category: "Entertainment", subcategory: "Film / Movie Clips", confidence: 84, genres: ["entertainment", "film", "movie"], reason: "Latest videos look like film, cinema, trailer, teaser, or movie clip content rather than gameplay.", source: "YouTube latest video metadata" };
      }
      if (seriesSignal && !gameplaySignal) {
        return {
          category: "Entertainment",
          subcategory: "TV Series / Drama / Clips",
          confidence: 86,
          genres: ["entertainment", "series", "drama", "clips"],
          reason: "Latest video titles/descriptions look like series, drama, trailers, episodes, or clips rather than gameplay.",
          source: "YouTube latest video metadata"
        };
      }
      if (comedySignal && !gameplaySignal) {
        return { category: "Entertainment", subcategory: "Comedy / Sketch", confidence: 80, genres: ["entertainment", "comedy"], reason: "Latest videos show comedy, sketch, parody, or stand-up signals.", source: "YouTube latest video metadata" };
      }
      if (educationSignal && !gameplaySignal) {
        return { category: "Education", subcategory: "Education / Explainer", confidence: 80, genres: ["education", "tutorial"], reason: "Latest videos show education, tutorial, or explainer signals.", source: "YouTube latest video metadata" };
      }
      if (techSignal && !gameplaySignal) {
        return { category: "Technology", subcategory: "Tech Review / Gadgets", confidence: 80, genres: ["technology", "review"], reason: "Latest videos show tech, gadget, software, review, or unboxing signals.", source: "YouTube latest video metadata" };
      }
      if (newsSignal && !gameplaySignal) {
        return { category: "News", subcategory: "News / Politics", confidence: 80, genres: ["news", "politics"], reason: "Latest videos show news, politics, or current-affairs signals.", source: "YouTube latest video metadata" };
      }
      if (vlogSignal && !gameplaySignal) {

      }

        const detail = classifyCreatorContent(text);
        const subcategory = detail.category === "Gaming" ? detail.subcategory : "General Gaming";
        return {
          category: "Gaming",
          subcategory,
          confidence: Math.max(72, Math.min(92, 58 + top[1] * 5 + (gameplaySignal ? 12 : 0))),
          genres: detail.genres?.length ? detail.genres : ["gaming"],
          reason: `Latest videos show gaming evidence. YouTube video category majority: ${top[0]} (${top[1]}/${videoItems.length}).`,
          source: "YouTube latest video metadata"
        };

      }

      }
      if (["Entertainment", "Film & Animation", "Comedy", "People & Blogs"].includes(top[0])) {
        const subtype = top[0] === "Film & Animation" ? "Film / Animation" : top[0] === "Comedy" ? "Comedy / Sketch" : top[0] === "People & Blogs" ? "People / Lifestyle" : "Entertainment / Video Content";
        return {

          reason: `Latest videos are mostly in YouTube category ${top[0]} (${top[1]}/${videoItems.length}); no strong gameplay signal found.`,
          source: "YouTube latest video metadata"

      }
      return {
        category: "Unclear",

    function mergeClassifications(ruleResult, videoResult) {
      if (!videoResult || videoResult.category === "Unclear") return ruleResult;
      if (!ruleResult || ruleResult.category === "Unclear") return videoResult;

      if (videoResult.category !== ruleResult.category && videoResult.confidence >= 70) return videoResult;
      return ruleResult;
    }

    function splitDelimitedLine(line, separator) {
      const cells = [];
      let cell = "";
      let quoted = false;
      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        const next = line[index + 1];
        if (char === '"' && quoted && next === '"') {
          cell += '"';
          index += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === separator && !quoted) {
          cells.push(cell.trim());
          cell = "";
        } else {
          cell += char;
        }
      }
      cells.push(cell.trim());
      return cells;
    }

    function parseDelimitedRows(raw) {
      const textValue = String(raw || "").replace(/\r/g, "").trim();
      if (!textValue) return [];
      const separator = textValue.includes("\t") ? "\t" : (textValue.includes(";") && !textValue.includes(",") ? ";" : ",");
      return textValue.split("\n").map((line) => splitDelimitedLine(line, separator)).filter((row) => row.some(Boolean));
    }

    function rowsToObjects(rows) {
      if (!rows.length) return [];
      const first = rows[0].map((cell) => String(cell || "").toLowerCase());
      const hasUrlInFirstRow = first.some((cell) => /youtube\.com|youtu\.be|^@[\w.-]+$/i.test(cell.trim()));
      const hasHeader = rows.length > 1 && !hasUrlInFirstRow && first.some((cell) => /channel|name|link|url|youtube|geo|country/.test(cell));
      if (!hasHeader) {
        return rows.map((row) => Object.fromEntries(row.map((cell, index) => [`cell${index}`, cell])));
      }
      const headers = rows[0].map((cell, index) => String(cell || `Column ${index + 1}`).trim() || `Column ${index + 1}`);
      return rows.slice(1).map((row) => Object.fromEntries(headers.map((header, index) => [header, row[index] || ""])));
    }

    function compactKey(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function fieldFromRow(row, aliases) {
      const entries = Object.entries(row);
      const wanted = aliases.map(compactKey);
      const exact = entries.find(([key]) => wanted.includes(compactKey(key)));
      if (exact) return String(exact[1] || "").trim();
      const loose = entries.find(([key]) => wanted.some((alias) => compactKey(key).includes(alias)));
      return loose ? String(loose[1] || "").trim() : "";
    }

    function findYouTubeSeedFromRow(row, index) {
      const values = Object.values(row).map((value) => String(value || "").trim()).filter(Boolean);

      const name = explicitName || firstText || (link ? `Creator ${index + 1}` : "");
      return {
        name,
        link,
        country: fieldFromRow(row, ["geo", "country", "market", "ülke", "ulke"]) || "Turkey",

    function loadImageFromDataUrl(dataUrl) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("Image could not be loaded."));
        image.src = dataUrl;
      });
    }

    async function preprocessImageForOcr(file) {
      const dataUrl = await fileToDataUrl(file);
      const image = await loadImageFromDataUrl(dataUrl);
      const scale = image.width < 900 ? 3 : 2;
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(image.width * scale);
      canvas.height = Math.round(image.height * scale);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
      for (let index = 0; index < pixels.data.length; index += 4) {
        const gray = pixels.data[index] * 0.299 + pixels.data[index + 1] * 0.587 + pixels.data[index + 2] * 0.114;
        const contrasted = Math.max(0, Math.min(255, (gray - 128) * 1.75 + 128));
        pixels.data[index] = contrasted;
        pixels.data[index + 1] = contrasted;
        pixels.data[index + 2] = contrasted;
      }
      ctx.putImageData(pixels, 0, 0);
      return canvas.toDataURL("image/png");
    }

    function extractScrumballMetricsFromOcr(textValue) {
      const text = String(textValue || "").replace(/\r/g, "\n");
      const compact = text.replace(/\n+/g, " ");
      const metrics = {};
      const followerMatch = compact.match(/(\d+(?:[.,]\d+)?\s*[KMB]?)\s*(?:Followers|Follower|Takip)/i);
      if (followerMatch) metrics.subscribers = normalizeNumberText(followerMatch[1]);
      const engagementMatch = compact.match(/(\d+(?:[.,]\d+)?)\s*%\s*Avg\s*eng/i);
      if (engagementMatch) metrics.avgEngagement = `${normalizeNumberText(engagementMatch[1])}%`;
      const avgViewMatch = compact.match(/(\d+(?:[.,]\d+)?)\s*%\s*Avg\s*view/i);
      if (avgViewMatch) metrics.avgViewRate = `${normalizeNumberText(avgViewMatch[1])}%`;
      const monthlyMatch = compact.match(/(\d+)\s*(?:Mthly|Monthly)\s*post/i);
      if (monthlyMatch) metrics.monthlyPost = monthlyMatch[1];
      const countries = [];
      const countryPattern = /(Turkey|Azerbaijan|Germany|Netherlands|United Kingdom|United States|USA|France|Brazil|Japan|Korea|China|India|Spain|Italy)\s+(\d+(?:[.,]\d+)?)\s*%/gi;
      let countryMatch;
      while ((countryMatch = countryPattern.exec(compact))) {
        countries.push(`${countryMatch[1]} ${normalizeNumberText(countryMatch[2])}%`);
      }
      if (countries.length) {
        metrics.geo = countries[0];
        metrics.audienceLocation = countries.join("; ");
      }
      const femaleMatch = compact.match(/Female/i);
      const maleMatch = compact.match(/Male/i);
      if (femaleMatch || maleMatch) metrics.demographicsSource = "Scrumball screenshot";
      return metrics;
    }

    function connectedColorComponents(width, height, isMatch) {
      const visited = new Uint8Array(width * height);
      const components = [];
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const start = y * width + x;
          if (visited[start] || !isMatch(x, y)) continue;
          const stack = [[x, y]];
          visited[start] = 1;
          let minX = x, maxX = x, minY = y, maxY = y, count = 0;
          while (stack.length) {
            const [cx, cy] = stack.pop();
            count += 1;
            minX = Math.min(minX, cx); maxX = Math.max(maxX, cx);
            minY = Math.min(minY, cy); maxY = Math.max(maxY, cy);
            [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx, dy]) => {
              const nx = cx + dx, ny = cy + dy;
              if (nx < 0 || ny < 0 || nx >= width || ny >= height) return;
              const next = ny * width + nx;
              if (!visited[next] && isMatch(nx, ny)) {
                visited[next] = 1;
                stack.push([nx, ny]);
              }
            });
          }
          components.push({ minX, maxX, minY, maxY, width: maxX - minX + 1, height: maxY - minY + 1, count, centerX: (minX + maxX) / 2 });
        }
      }
      return components;
    }

    async function analyzeScrumballVisualFromImage(file) {
      const dataUrl = await fileToDataUrl(file);
      const image = await loadImageFromDataUrl(dataUrl);
      const canvas = document.createElement("canvas");
      canvas.width = image.width;
      canvas.height = image.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(image, 0, 0);
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      const pixel = (x, y) => {
        const index = (y * canvas.width + x) * 4;
        return [pixels[index], pixels[index + 1], pixels[index + 2]];
      };
      const gridRowsRaw = [];
      const gridExtents = [];
      for (let y = Math.round(canvas.height * 0.18); y < Math.round(canvas.height * 0.78); y += 1) {
        const xs = [];
        for (let x = Math.round(canvas.width * 0.08); x < Math.round(canvas.width * 0.96); x += 1) {
          const [r, g, b] = pixel(x, y);
          if (r >= 195 && r <= 245 && g >= 200 && g <= 248 && b >= 210 && b <= 252) xs.push(x);
        }
        if (xs.length > canvas.width * 0.42) {
          gridRowsRaw.push(y);
          gridExtents.push({ y, minX: Math.min(...xs), maxX: Math.max(...xs) });
        }
      }
      const mergedGridRows = [];
      gridRowsRaw.forEach((y) => {
        const last = mergedGridRows[mergedGridRows.length - 1];
        if (last === undefined || y - last > 3) mergedGridRows.push(y);
        else mergedGridRows[mergedGridRows.length - 1] = Math.round((last + y) / 2);
      });
      const usableExtents = gridExtents.filter((line) => mergedGridRows.some((row) => Math.abs(row - line.y) <= 2));
      const plotLeft = usableExtents.length ? Math.min(...usableExtents.map((line) => line.minX)) : Math.round(canvas.width * 0.15);
      const plotRight = usableExtents.length ? Math.max(...usableExtents.map((line) => line.maxX)) : Math.round(canvas.width * 0.9);
      const topGrid = mergedGridRows.length >= 3 ? Math.min(...mergedGridRows) : Math.round(canvas.height * 0.28);
      const baseline = mergedGridRows.length >= 3 ? Math.max(...mergedGridRows) : Math.round(canvas.height * 0.62);
      const maxAxisPct = mergedGridRows.length >= 3 ? (mergedGridRows.length - 1) * 5 : 35;
      const inChartZone = (x, y) => x >= plotLeft - 8 && x <= plotRight + 8 && y >= topGrid - 8 && y <= baseline + 8;
      const isPink = (x, y) => {
        const [r, g, b] = pixel(x, y);
        return inChartZone(x, y) && r > 190 && g < 120 && b > 120;
      };
      const isBlue = (x, y) => {
        const [r, g, b] = pixel(x, y);
        return inChartZone(x, y) && b > 160 && r < 140 && g > 90;
      };
      const isRealBar = (box) =>
        box.height >= 3 &&
        box.width >= 2 &&
        box.width <= 34 &&
        box.count >= 10 &&
        box.minY >= topGrid - 4 &&
        box.maxY <= baseline + 5 &&
        box.maxY >= baseline - 10;
      const femaleBars = connectedColorComponents(canvas.width, canvas.height, isPink).filter(isRealBar);
      const maleBars = connectedColorComponents(canvas.width, canvas.height, isBlue).filter(isRealBar);
      const bars = [...femaleBars.map((box) => ({ ...box, gender: "F" })), ...maleBars.map((box) => ({ ...box, gender: "M" }))]
        .sort((a, b) => a.centerX - b.centerX);
      if (!bars.length) return {};
      const pctFromBar = (bar) => {
        const raw = ((baseline - bar.minY) / Math.max(1, baseline - topGrid)) * maxAxisPct;
        const pct = Math.max(0, Math.min(maxAxisPct, Math.round(raw)));
        return pct <= 1 && bar.height >= 2 ? 1 : pct;
      };
      const ageGroups = ["13-17", "18-24", "25-34", "35-44", "45-54", "55-64", "65+"];
      const step = ageGroups.length > 1 ? (plotRight - plotLeft) / (ageGroups.length - 1) : 1;
      const values = {};
      bars.forEach((bar) => {
        const ageIndex = Math.max(0, Math.min(ageGroups.length - 1, Math.round((bar.centerX - plotLeft) / step)));
        const pct = pctFromBar(bar);
        const key = ageGroups[ageIndex];
        values[key] = values[key] || {};
        values[key][bar.gender] = Math.max(values[key][bar.gender] || 0, pct);
      });
      const totalF = Object.values(values).reduce((sum, value) => sum + Number(value.F || 0), 0);
      const totalM = Object.values(values).reduce((sum, value) => sum + Number(value.M || 0), 0);
      const total = totalF + totalM;
      const ageMidpoints = { "13-17": 15, "18-24": 21, "25-34": 29.5, "35-44": 39.5, "45-54": 49.5, "55-64": 59.5, "65+": 68 };
      const weightedAgeSum = ageGroups.reduce((sum, age) => {
        const value = values[age] || {};
        return sum + (Number(value.F || 0) + Number(value.M || 0)) * ageMidpoints[age];
      }, 0);
      const avgAge = total ? Math.round(weightedAgeSum / total) : 0;
      const dominantAge = ageGroups
        .map((age) => ({ age, total: Number(values[age]?.F || 0) + Number(values[age]?.M || 0) }))
        .sort((a, b) => b.total - a.total)[0]?.age || "";
      const parts = ageGroups.map((age) => {
        const value = values[age] || {};
        if (!value.F && !value.M) return "";
        return `${age}: F${value.F || 0}% / M${value.M || 0}%`;
      }).filter(Boolean);
      return parts.length ? {
        ageGenderApprox: [`Avg age ~${avgAge}`, dominantAge ? `Dominant ${dominantAge}` : "", ...parts].filter(Boolean).join("; "),
        genderApprox: total ? `F${Math.round(totalF / total * 100)}% / M${Math.round(totalM / total * 100)}%` : "",
        demographicsSource: "Scrumball screenshot visual estimate"
      } : {};
    }

    function rowsFromOcrText(textValue, context = {}, visualMetrics = {}) {
      const lines = String(textValue || "").replace(/\r/g, "\n").split("\n").map((line) => line.trim()).filter(Boolean);
      const rows = [];
      const scrumball = { ...extractScrumballMetricsFromOcr(textValue), ...visualMetrics };
      const contextLink = String(context.channelLink || "").trim();
      const contextName = String(context.channelName || "").trim();
      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index];
        const link = (line.match(/https?:\/\/(?:www\.)?(?:youtube\.com|youtu\.be)\/\S+/i) || [])[0] || "";
        const handle = (line.match(/(?:youtube\.com\/)?@([A-Za-z0-9._-]+)/i) || [])[0] || "";
        const hasMetrics = /\b\d+(?:[.,]\d+)?\s*[KMB]?\b/i.test(line) && /(views?|followers?|subscribers?|avg|yorum|comment|takip)/i.test(line);
        if (link || handle || hasMetrics) {
          const cleaned = line.replace(link, "").replace(handle, "").replace(/\s{2,}/g, " ").trim();
          rows.push({
            "Channel Name": contextName || cleaned.split(/[|,\t]/)[0] || cleaned || handle || link || `Image row ${rows.length + 1}`,
            "Link": contextLink || link || (handle.startsWith("@") ? `https://www.youtube.com/${handle}` : ""),
            "GEO": scrumball.geo || "",
            "Gender": scrumball.genderApprox || "",
            "Age": scrumball.ageGenderApprox || "",
            "Subscribers": scrumball.subscribers || "",
            "Avg Comments": "",
            "Comments": [line, scrumball.avgEngagement ? `Avg engagement: ${scrumball.avgEngagement}` : "", scrumball.avgViewRate ? `Avg view rate: ${scrumball.avgViewRate}` : "", scrumball.monthlyPost ? `Monthly post: ${scrumball.monthlyPost}` : "", scrumball.audienceLocation ? `Audience location: ${scrumball.audienceLocation}` : "", scrumball.ageGenderApprox ? `Age/gender approx: ${scrumball.ageGenderApprox}` : "", scrumball.demographicsSource ? `Demographics source: ${scrumball.demographicsSource}` : ""].filter(Boolean).join("; ")
          });
        }
      }
      if (!rows.length && (contextLink || contextName || Object.keys(scrumball).length)) {
        rows.push({
          "Channel Name": contextName || "Creator from screenshot",
          "Link": contextLink,
          "GEO": scrumball.geo || "",
          "Gender": scrumball.genderApprox || "",
          "Age": scrumball.ageGenderApprox || "",
          "Subscribers": scrumball.subscribers || "",
          "Comments": [scrumball.avgEngagement ? `Avg engagement: ${scrumball.avgEngagement}` : "", scrumball.avgViewRate ? `Avg view rate: ${scrumball.avgViewRate}` : "", scrumball.monthlyPost ? `Monthly post: ${scrumball.monthlyPost}` : "", scrumball.audienceLocation ? `Audience location: ${scrumball.audienceLocation}` : "", scrumball.ageGenderApprox ? `Age/gender approx: ${scrumball.ageGenderApprox}` : "", scrumball.demographicsSource ? `Demographics source: ${scrumball.demographicsSource}` : ""].filter(Boolean).join("; ")
        });
      }
      if (rows.length) return rows;
      const joined = lines.join("\n");
      const parsed = rowsToObjects(parseDelimitedRows(joined));
      return parsed.length ? parsed : [];
    }

    async function readImageRowsWithOcr(file, status, context = {}) {
      if (!window.Tesseract) throw new Error("GPT failed and OCR library could not load. Open with http://127.0.0.1:5177/ and check internet/CDN access.");
      const dataUrl = await fileToDataUrl(file);
      const enhancedUrl = await preprocessImageForOcr(file).catch(() => dataUrl);
      const visualMetrics = await analyzeScrumballVisualFromImage(file).catch(() => ({}));
      if (status) status.textContent = "GPT failed. Trying local OCR text reading...";
      const runOcr = (imageUrl, label) => Tesseract.recognize(imageUrl, "eng", {
        logger: (progress) => {
          if (status && progress.status) {
            const pct = progress.progress ? ` ${Math.round(progress.progress * 100)}%` : "";
            status.textContent = `OCR ${label}: ${progress.status}${pct}`;
          }
        },
        tessedit_pageseg_mode: "6",
        preserve_interword_spaces: "1"
      });
      const enhanced = await runOcr(enhancedUrl, "enhanced");
      let original = { data: { text: "" } };
      if ((enhanced.data?.text || "").length < 80) {
        original = await runOcr(dataUrl, "original");
      }
      const combinedText = [enhanced.data?.text || "", original.data?.text || ""].join("\n");
      const rows = rowsFromOcrText(combinedText, context, visualMetrics);
      if (!rows.length) throw new Error("OCR read text but no usable creator rows or YouTube links were found.");
      return rows;
    }
