    function extractScrumballMetricsFromOcr(textValue) {
      const text = String(textValue || "").replace(/\r/g, "\n");
      const compact = text.replace(/\n+/g, " ");
      const metrics = {};
      const followerMatch = compact.match(/(\d+(?:[.,]\d+)?\s*[KMB]?)\s*(?:Followers|Follower|Takip)/i);
      if (followerMatch) metrics.subscribers = normalizeNumberText(followerMatch[1]);
      const engagementMatch = compact.match(/(\d+(?:[.,]\d+)?)\s*%\s*Avg\s*eng/i);
      if (engagementMatch) metrics.avgEngagement = `${normalizeNumberText(engagementMatch[1])}%`;
      const avgViewMatch = compact.match(/(\d+(?:[.,]\d+)?)\s*%\s*Avg\s*view/i);
      if (avgViewMatch) metrics.avgViewRate = `${normalizeNumberText(avgViewMatch[1])}%`;
      const monthlyMatch = compact.match(/(\d+)\s*(?:Mthly|Monthly)\s*post/i);
      if (monthlyMatch) metrics.monthlyPost = monthlyMatch[1];
      const countries = [];
      const countryPattern = /(Turkey|Azerbaijan|Germany|Netherlands|United Kingdom|United States|USA|France|Brazil|Japan|Korea|China|India|Spain|Italy)\s+(\d+(?:[.,]\d+)?)\s*%/gi;
      let countryMatch;
      while ((countryMatch = countryPattern.exec(compact))) {
        countries.push(`${countryMatch[1]} ${normalizeNumberText(countryMatch[2])}%`);
      }
      if (countries.length) {
        metrics.geo = countries[0];
        metrics.audienceLocation = countries.join("; ");
      }
      const femaleMatch = compact.match(/Female/i);
      const maleMatch = compact.match(/Male/i);
      if (femaleMatch || maleMatch) metrics.demographicsSource = "Scrumball screenshot";
      return metrics;
    }

    function connectedColorComponents(width, height, isMatch) {
      const visited = new Uint8Array(width * height);
      const components = [];
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const start = y * width + x;
          if (visited[start] || !isMatch(x, y)) continue;
          const stack = [[x, y]];
          visited[start] = 1;
          let minX = x, maxX = x, minY = y, maxY = y, count = 0;
          while (stack.length) {
            const [cx, cy] = stack.pop();
            count += 1;
            minX = Math.min(minX, cx); maxX = Math.max(maxX, cx);
            minY = Math.min(minY, cy); maxY = Math.max(maxY, cy);
            [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx, dy]) => {
              const nx = cx + dx, ny = cy + dy;
              if (nx < 0 || ny < 0 || nx >= width || ny >= height) return;
              const next = ny * width + nx;
              if (!visited[next] && isMatch(nx, ny)) {
                visited[next] = 1;
                stack.push([nx, ny]);
              }
            });
          }
          components.push({ minX, maxX, minY, maxY, width: maxX - minX + 1, height: maxY - minY + 1, count, centerX: (minX + maxX) / 2 });
        }
      }
      return components;
    }

    async function analyzeScrumballVisualFromImage(file) {
      const dataUrl = await fileToDataUrl(file);
      const image = await loadImageFromDataUrl(dataUrl);
      const canvas = document.createElement("canvas");
      canvas.width = image.width;
      canvas.height = image.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(image, 0, 0);
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      const pixel = (x, y) => {
        const index = (y * canvas.width + x) * 4;
        return [pixels[index], pixels[index + 1], pixels[index + 2]];
      };
      const gridRowsRaw = [];
      const gridExtents = [];
      for (let y = Math.round(canvas.height * 0.18); y < Math.round(canvas.height * 0.78); y += 1) {
        const xs = [];
        for (let x = Math.round(canvas.width * 0.08); x < Math.round(canvas.width * 0.96); x += 1) {
          const [r, g, b] = pixel(x, y);
          if (r >= 195 && r <= 245 && g >= 200 && g <= 248 && b >= 210 && b <= 252) xs.push(x);
        }
        if (xs.length > canvas.width * 0.42) {
          gridRowsRaw.push(y);
          gridExtents.push({ y, minX: Math.min(...xs), maxX: Math.max(...xs) });
        }
      }
      const mergedGridRows = [];
      gridRowsRaw.forEach((y) => {
        const last = mergedGridRows[mergedGridRows.length - 1];
        if (last === undefined || y - last > 3) mergedGridRows.push(y);
        else mergedGridRows[mergedGridRows.length - 1] = Math.round((last + y) / 2);
      });
      const usableExtents = gridExtents.filter((line) => mergedGridRows.some((row) => Math.abs(row - line.y) <= 2));
      const plotLeft = usableExtents.length ? Math.min(...usableExtents.map((line) => line.minX)) : Math.round(canvas.width * 0.15);
      const plotRight = usableExtents.length ? Math.max(...usableExtents.map((line) => line.maxX)) : Math.round(canvas.width * 0.9);
      const topGrid = mergedGridRows.length >= 3 ? Math.min(...mergedGridRows) : Math.round(canvas.height * 0.28);
      const baseline = mergedGridRows.length >= 3 ? Math.max(...mergedGridRows) : Math.round(canvas.height * 0.62);
      const maxAxisPct = mergedGridRows.length >= 3 ? (mergedGridRows.length - 1) * 5 : 35;
      const inChartZone = (x, y) => x >= plotLeft - 8 && x <= plotRight + 8 && y >= topGrid - 8 && y <= baseline + 8;
      const isPink = (x, y) => {
        const [r, g, b] = pixel(x, y);
        return inChartZone(x, y) && r > 190 && g < 120 && b > 120;
      };
      const isBlue = (x, y) => {
        const [r, g, b] = pixel(x, y);
        return inChartZone(x, y) && b > 160 && r < 140 && g > 90;
      };
      const isRealBar = (box) =>
        box.height >= 3 &&
        box.width >= 2 &&
        box.width <= 34 &&
        box.count >= 10 &&
        box.minY >= topGrid - 4 &&
        box.maxY <= baseline + 5 &&
        box.maxY >= baseline - 10;
      const femaleBars = connectedColorComponents(canvas.width, canvas.height, isPink).filter(isRealBar);
      const maleBars = connectedColorComponents(canvas.width, canvas.height, isBlue).filter(isRealBar);
      const bars = [...femaleBars.map((box) => ({ ...box, gender: "F" })), ...maleBars.map((box) => ({ ...box, gender: "M" }))]
        .sort((a, b) => a.centerX - b.centerX);
      if (!bars.length) return {};
      const pctFromBar = (bar) => {
        const raw = ((baseline - bar.minY) / Math.max(1, baseline - topGrid)) * maxAxisPct;
        const pct = Math.max(0, Math.min(maxAxisPct, Math.round(raw)));
        return pct <= 1 && bar.height >= 2 ? 1 : pct;
      };
      const ageGroups = ["13-17", "18-24", "25-34", "35-44", "45-54", "55-64", "65+"];
      const step = ageGroups.length > 1 ? (plotRight - plotLeft) / (ageGroups.length - 1) : 1;
      const values = {};
      bars.forEach((bar) => {
        const ageIndex = Math.max(0, Math.min(ageGroups.length - 1, Math.round((bar.centerX - plotLeft) / step)));
        const pct = pctFromBar(bar);
        const key = ageGroups[ageIndex];
        values[key] = values[key] || {};
        values[key][bar.gender] = Math.max(values[key][bar.gender] || 0, pct);
      });
      const totalF = Object.values(values).reduce((sum, value) => sum + Number(value.F || 0), 0);
      const totalM = Object.values(values).reduce((sum, value) => sum + Number(value.M || 0), 0);
      const total = totalF + totalM;
      const ageMidpoints = { "13-17": 15, "18-24": 21, "25-34": 29.5, "35-44": 39.5, "45-54": 49.5, "55-64": 59.5, "65+": 68 };
      const weightedAgeSum = ageGroups.reduce((sum, age) => {
        const value = values[age] || {};
        return sum + (Number(value.F || 0) + Number(value.M || 0)) * ageMidpoints[age];
      }, 0);
      const parts = ageGroups.map((age) => {
        const value = values[age] || {};
        const ageTotal = Math.round(Number(value.F || 0) + Number(value.M || 0));
        if (!ageTotal) return "";
        return `${age}: ${ageTotal}%`;
      }).filter(Boolean);
      return parts.length ? {
        ageGenderApprox: parts.join("; "),
        genderApprox: total ? `F${Math.round(totalF / total * 100)}% / M${Math.round(totalM / total * 100)}%` : "",
        demographicsSource: "Scrumball screenshot visual estimate"
      } : {};
    }

    function rowsFromOcrText(textValue, context = {}, visualMetrics = {}) {
      const lines = String(textValue || "").replace(/\r/g, "\n").split("\n").map((line) => line.trim()).filter(Boolean);
      const rows = [];
      const scrumball = { ...extractScrumballMetricsFromOcr(textValue), ...visualMetrics };
      const contextLink = String(context.channelLink || "").trim();
      const contextName = String(context.channelName || "").trim();
      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index];
        const link = (line.match(/https?:\/\/(?:www\.)?(?:youtube\.com|youtu\.be)\/\S+/i) || [])[0] || "";
        const handle = (line.match(/(?:youtube\.com\/)?@([A-Za-z0-9._-]+)/i) || [])[0] || "";
        const hasMetrics = /\b\d+(?:[.,]\d+)?\s*[KMB]?\b/i.test(line) && /(views?|followers?|subscribers?|avg|yorum|comment|takip)/i.test(line);
        if (link || handle || hasMetrics) {
          const cleaned = line.replace(link, "").replace(handle, "").replace(/\s{2,}/g, " ").trim();
          rows.push({
            "Channel Name": contextName || cleaned.split(/[|,\t]/)[0] || cleaned || handle || link || `Image row ${rows.length + 1}`,
            "Link": contextLink || link || (handle.startsWith("@") ? `https://www.youtube.com/${handle}` : ""),
            "GEO": scrumball.geo || "",
            "Gender": scrumball.genderApprox || "",
            "Age": scrumball.ageGenderApprox || "",
            "Subscribers": scrumball.subscribers || "",
            "Comments": [line, scrumball.avgEngagement ? `Avg engagement: ${scrumball.avgEngagement}` : "", scrumball.avgViewRate ? `Avg view rate: ${scrumball.avgViewRate}` : "", scrumball.monthlyPost ? `Monthly post: ${scrumball.monthlyPost}` : "", scrumball.audienceLocation ? `Audience location: ${scrumball.audienceLocation}` : "", scrumball.ageGenderApprox ? `Age/gender approx: ${scrumball.ageGenderApprox}` : "", scrumball.demographicsSource ? `Demographics source: ${scrumball.demographicsSource}` : ""].filter(Boolean).join("; ")
          });
        }
      }
      if (!rows.length && (contextLink || contextName || Object.keys(scrumball).length)) {
        rows.push({
          "Channel Name": contextName || "Creator from screenshot",
          "Link": contextLink,
          "GEO": scrumball.geo || "",
          "Gender": scrumball.genderApprox || "",
          "Age": scrumball.ageGenderApprox || "",
          "Subscribers": scrumball.subscribers || "",
          "Comments": [scrumball.avgEngagement ? `Avg engagement: ${scrumball.avgEngagement}` : "", scrumball.avgViewRate ? `Avg view rate: ${scrumball.avgViewRate}` : "", scrumball.monthlyPost ? `Monthly post: ${scrumball.monthlyPost}` : "", scrumball.audienceLocation ? `Audience location: ${scrumball.audienceLocation}` : "", scrumball.ageGenderApprox ? `Age/gender approx: ${scrumball.ageGenderApprox}` : "", scrumball.demographicsSource ? `Demographics source: ${scrumball.demographicsSource}` : ""].filter(Boolean).join("; ")
        });
      }
      if (rows.length) return rows;
      const joined = lines.join("\n");
      const parsed = rowsToObjects(parseDelimitedRows(joined));
      return parsed.length ? parsed : [];
    }

    async function readImageRowsWithOcr(file, status, context = {}) {
      if (!window.Tesseract) throw new Error("GPT failed and OCR library could not load. Open with http://127.0.0.1:5177/ and check internet/CDN access.");
      const dataUrl = await fileToDataUrl(file);
      const enhancedUrl = await preprocessImageForOcr(file).catch(() => dataUrl);
      const visualMetrics = await analyzeScrumballVisualFromImage(file).catch(() => ({}));
      if (status) status.textContent = "GPT failed. Trying local OCR text reading...";
      const runOcr = (imageUrl, label) => Tesseract.recognize(imageUrl, "eng", {
        logger: (progress) => {
          if (status && progress.status) {
            const pct = progress.progress ? ` ${Math.round(progress.progress * 100)}%` : "";
            status.textContent = `OCR ${label}: ${progress.status}${pct}`;
          }
        },
        tessedit_pageseg_mode: "6",
        preserve_interword_spaces: "1"
      });
      const enhanced = await runOcr(enhancedUrl, "enhanced");
      let original = { data: { text: "" } };
      if ((enhanced.data?.text || "").length < 80) {
        original = await runOcr(dataUrl, "original");
      }
      const combinedText = [enhanced.data?.text || "", original.data?.text || ""].join("\n");
      const rows = rowsFromOcrText(combinedText, context, visualMetrics);
      if (!rows.length) throw new Error("OCR read text but no usable creator rows or YouTube links were found.");
      return rows;
    }

    async function uploadImageData() {
      const status = $("imageStatus");
      const file = $("imageDataFile").files?.[0];
      const channelLink = $("imageChannelLink")?.value?.trim() || "";
      if (!channelLink) {
        if (status) status.textContent = "A channel link or @handle is required before reading the image.";
        return;
      }
      if (!file) {
        if (state.pendingImageDataUrl) {
          const pastedFile = dataUrlToFile(state.pendingImageDataUrl, "pasted-screenshot.png");
          await processImageDataFile(pastedFile, "pasted image");
          return;
        }
        if (status) status.textContent = "Choose/paste a screenshot first, then press Read image data.";
        return;
      }
      await processImageDataFile(file, "image");
    }

    function dataUrlToFile(dataUrl, fileName) {
      const [meta, data] = String(dataUrl || "").split(",");
      const mime = meta.match(/data:([^;]+)/)?.[1] || "image/png";
      const binary = atob(data || "");
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
      return new File([bytes], fileName, { type: mime });
    }

    function rowFromImageContext(context = {}, note = "") {
      const channelLink = String(context.channelLink || "").trim();
      const handle = channelLink.match(/^@[\w.-]+$/) ? channelLink : "";
      const nameFromLink = handle || channelLink.match(/youtube\.com\/@([A-Za-z0-9._-]+)/i)?.[1] || "";
      return {
        "Channel Name": context.channelName || nameFromLink || "Creator from screenshot",
        "Link": channelLink,
        "Comments": note
      };
    }

    async function processImageDataFile(file, sourceLabel = "image") {
      const status = $("imageStatus");
      const channelLink = $("imageChannelLink")?.value?.trim() || "";
      const context = {
        channelLink,
        channelName: channelLink ? "" : ""
      };
      try {
        if (status) status.textContent = `Reading ${sourceLabel} data...`;
        let rows = [];
        let readError = "";
        try {
          rows = await readImageRowsWithGPT(file, status, context);
        } catch (gptError) {
          if (status) status.textContent = `${gptError.message}. Trying OCR fallback...`;
          readError = gptError.message;
          try {
            rows = await readImageRowsWithOcr(file, status, context);
          } catch (ocrError) {
            readError = `${readError}; OCR: ${ocrError.message}`;
            rows = [];
          }
        }
        if (channelLink) {
          rows = rows.length ? rows.map((row) => ({
            ...row,
            "Link": fieldFromRow(row, ["link", "url", "youtube", "youtube link"]) || channelLink,
            "Comments": [fieldFromRow(row, ["comments", "notes", "comment"]), readError ? `Image read issue: ${readError}` : ""].filter(Boolean).join("; ")
          })) : [rowFromImageContext(context, readError ? `Image could not be read clearly. ${readError}` : "Screenshot attached; using provided YouTube link.")];
        }
        if (status) status.textContent = `${sourceLabel} read: ${rows.length} row(s). Filling missing fields only...`;
        applyOcrRowsToExistingInfluencers(rows, "imageStatus");
      } catch (error) {
        if (status) status.textContent = error.message;
      }
    }

    async function handleImagePaste(event) {
      const status = $("imageStatus");
      const items = Array.from(event.clipboardData?.items || []);
      const imageItem = items.find((item) => item.type.startsWith("image/"));
      const textItem = items.find((item) => item.type === "text/plain");
      if (imageItem) {
        event.preventDefault();
        const file = imageItem.getAsFile();
        if (!file) {
          if (status) status.textContent = "Pasted image could not be read.";
          return;
        }
        state.pendingImageDataUrl = await fileToDataUrl(file);
        state.pendingImageName = `Pasted image (${Math.round(file.size / 1024)} KB)`;
        saveState();
        $("imagePasteZone").textContent = `Pasted image: ${file.type || "image"} (${Math.round(file.size / 1024)} KB)`;
        if (status) status.textContent = "Screenshot is ready. Enter the channel link, then press Read image data.";
        return;
      }
      if (textItem) {
        event.preventDefault();
        textItem.getAsString(async (textValue) => {
          $("imageChannelLink").value = textValue.trim();
          if (status) status.textContent = "Pasted text added as channel link. Press Read image data when ready.";
        });
        return;
      }
      if (status) status.textContent = "Paste a screenshot image or text rows.";
    }
    function inferLocalizationGenre(source, selectedGenre) {
      if (selectedGenre && selectedGenre !== "auto") return selectedGenre;
      const text = `${source || ""} ${state.project.genre || ""} ${state.project.keywords || ""}`.toLowerCase();
      if (/fps|shooter|gun|weapon|sniper|battle royale|aim|combat|pvp/.test(text)) return "fps";
      if (/mmo|mmorpg|rpg|guild|raid|class|hero|quest|dungeon|open world|fantasy/.test(text)) return "mmo";
      if (/strategy|4x|empire|base|fleet|alliance|commander|conquer|tactic|kingdom/.test(text)) return "strategy";
      if (/match|puzzle|casual|merge|tile|relax|easy|decorate/.test(text)) return "casual";
      if (/horror|survival|zombie|ghost|fear|mystery/.test(text)) return "horror";
      if (/race|racing|drift|car|speed|track/.test(text)) return "racing";
      if (/sim|simulation|farm|city|manager|tycoon|life/.test(text)) return "simulation";
      return "strategy";
    }

      const profiles = {

        mmo: { label: "MMO / RPG", rule: "World fantasy, classes, guilds, raids, loot, growth, long-term progression.", avoid: "Only saying fast action; missing community/progression." },
        strategy: { label: "Strategy / 4X", rule: "Command, build, expand, alliance, tactics, conquest, resource decisions.", avoid: "Generic battle copy without strategic payoff." },
        casual: { label: "Casual / Puzzle", rule: "Easy to understand, satisfying rewards, low pressure, friendly verbs.", avoid: "Hardcore jargon and aggressive CTA." },
        horror: { label: "Horror", rule: "Suspense, survival, secrets, atmosphere, danger, mystery.", avoid: "Comedy tone or too much direct explanation." },

        simulation: { label: "Simulation", rule: "Create, manage, upgrade, customize, daily progress, ownership.", avoid: "Combat-heavy words unless the game has combat." }

    function latinWordSet(value) {
      return new Set((String(value || "").toLowerCase().match(/[a-zçğıöşü]+/g) || []).filter((word) => word.length > 2));
    }

    function isUsableFallbackTranslation(source, output, lang) {
      const sourceWords = latinWordSet(source);
      const outputText = String(output || "").toLowerCase();
      if (!sourceWords.size) return true;
      if (lang === "zh") return /[\u4e00-\u9fff]/.test(outputText);
      const leftovers = [...sourceWords].filter((word) => outputText.includes(word));
      const leftoverRatio = leftovers.length / sourceWords.size;
      return leftoverRatio < 0.45;
    }

          if (genre === "mmo") return "Silahını kuşan ve dünyayı fethet";
          if (genre === "fps") return "Silahını hazırla, dünyayı fethet";

        if (genre === "casual") return text.replace(/Topla/i, "Al").replace(/Geliştir/i, "Yükselt");

      if (lang === "en") {
        if (/^Join a guild$/i.test(text)) return genre === "mmo" ? "Join your guild" : "Join a team";

          if (genre === "casual") return "Retry and conquer the world";

        }
        if (/^Send greeting$/i.test(text)) {
          if (genre === "fps") return "Greet your squad";
          if (genre === "mmo") return "Greet your guild";
          return "Send a greeting";

    function shortenGameString(text, lang) {
      const clean = String(text || "").trim();
      if (lang === "tr" && /^selam gönder$|^takıma selam ver$/i.test(clean)) return clean;
      if (lang === "tr" && clean.includes(",")) return clean.split(",")[0].trim();
      if (lang === "en" && clean.includes(",")) return clean.split(",")[0].trim();
      if (lang === "zh" && clean.includes("，")) return clean.split("，")[0].trim();

      const words = clean.split(/\s+/);
      if (lang === "zh") return clean.slice(0, 8);
      return words.slice(0, 3).join(" ");

        tr: { selam: "selam", ver: "gönder / ver", merhaba: "merhaba", pull: "çek / çıkar", gun: "silah", shoot: "vur / ateş et", shot: "vur / ateş et", person: "kişi / hedef", ready: "hazırla / kuşan", weapon: "silah", weapons: "silahlar", conquer: "fethet", world: "dünya", build: "kur", fleet: "filo", join: "katıl", guild: "lonca", collect: "topla", daily: "günlük", reward: "ödül" },

      return suggestions.length ? suggestions.join("; ") : "-";

    function gameStyleAnalysis(source, lang, genre) {
      const count = String(source || "").trim().split(/\s+/).filter(Boolean).length;

      const typeEn = count <= 3 ? "short UI string" : count <= 9 ? "short in-game sentence" : "long description/sentence";
      const typeZh = count <= 3 ? "短 UI 文本" : count <= 9 ? "短游戏内句子" : "较长说明/句子";
      if (lang === "tr") return `${typeTr}; ${localizationProfileForLang(genre, lang).label} için doğal, kısa ve Türkçe karakterli kullanım önerildi.`;
      if (lang === "zh") return `${typeZh}; 按 ${localizationProfileForLang(genre, lang).label} 语气处理，优先游戏内短句。`;

    function formatLocalizationOutput(text) {

        if (/^(option\s+\d+|seçenek\s+\d+|secenek\s+\d+|se.ene?k\s+\d+|选项\s*\d+)/i.test(line)) {
          current = { title: line.replace(/^(option\s+\d+\s*-\s*|seçenek\s+\d+\s*-\s*|secenek\s+\d+\s*-\s*|se.ene?k\s+\d+\s*-\s*|选项\s*\d+\s*-\s*)/i, "").replace(/:$/, "") || "Translation", body: [] };
          cards.push(current);
        } else if (cardHeading.test(line)) {
          current = { title: line.replace(/:$/, ""), body: [] };
          cards.push(current);
        } else if (/^(game type|style analysis|language rule|avoid|tone|source text|source meaning kept|oyun türü|oyun turu|tarz analizi|dil kuralı|dil kurali|kaçın|kacin|ton|kaynak metin|korunan kaynak anlamı|korunan kaynak anlami|游戏类型|风格分析|语言规则|避免|语气|源文本|保留原意):/i.test(line)) {
          meta.push(line);
          current = null;
        } else if (current) {
          current.body.push(line);
        } else {
          meta.push(line);
        }
      }
      if (!cards.length) {
        return `<div class="loc-output"><div class="option-card">${esc(raw)}</div></div>`;

    function normalizeLocalizationCardsForDisplay(cards = [], lang = state.lang) {
      const labels = localizationDisplayLabels(lang);
      const translationCard = cards.find((card) => /translation|çeviri|ceviri|翻译|oyun içi|in-game|游戏内|normal/i.test(card.title)) || cards[0];
      const glossaryCard = cards.find((card) => /glossary|sözlük|sozluk|word-by-word|kelime|öneri|oneri|suggestion|术语|逐词/i.test(card.title));
      const noteCard = cards.find((card) => /note|not|备注/i.test(card.title));
      const result = [];
      if (translationCard) result.push({ title: labels.translation, body: translationCard.body });
      if (glossaryCard) result.push({ title: labels.glossary, body: glossaryCard.body });
      if (noteCard) result.push({ title: labels.note, body: noteCard.body });
      return result.length ? result : cards;

    function normalizeLocalizationOption(text) {

    function sentenceCaseText(text) {
      const clean = String(text || "").trim();

    function compactPhrase(text, lang) {
      const clean = String(text || "").trim();
      if (!clean) return "";
      if (lang === "zh") return clean.slice(0, 8);
      const words = clean.split(/\s+/).filter(Boolean);
      if (words.length <= 1) return clean;
      if (words.length === 2) return words[1] && words[1].length > 2 ? words[1] : clean;
      if (words.length <= 4) return words.slice(-2).join(" ");
      return words.slice(-3).join(" ");
    }

      if (clean.includes(",") || clean.includes(";")) {
        const parts = clean.split(/[,;]/).map((part) => part.trim()).filter(Boolean);
        const first = sentenceCaseText(parts[0] || clean);
        const rest = sentenceCaseText(parts.slice(1).join(", ") || parts[0] || clean);
        const short = compactPhrase(rest, lang);
        return [`${first}. ${rest}`, short !== clean ? short : compactPhrase(first, lang)];

    function improveLocalizationOutput(text, context = {}) {
      const raw = String(text || "").trim();
      if (!raw) return raw;
      const parsed = parseLocalizationCards(raw);
      if (!parsed.cards.length) return raw;
      const labels = localizationDisplayLabels(context.lang || state.lang);
      const translationCard = parsed.cards.find((card) => /translation|çeviri|ceviri|翻译|oyun içi|in-game|游戏内|normal/i.test(card.title)) || parsed.cards[0];
      const glossaryCard = parsed.cards.find((card) => /glossary|sözlük|sozluk|word-by-word|kelime|öneri|oneri|suggestion|术语|逐词/i.test(card.title));
      const noteCard = parsed.cards.find((card) => /note|not|备注/i.test(card.title));
      const translation = translationCard?.body.join(" ").trim();
      if (!translation) return raw;
      return [
        ...parsed.meta,
        `${labels.translation}:\n${translation}`,
        `${labels.glossary}:\n${glossaryCard?.body.join(" ").trim() || wordSuggestions(context.source || translation, context.lang || state.lang, context.genre || "strategy")}`,
        `${labels.note}:\n${noteCard?.body.join(" ").trim() || (context.lang === "tr" ? "Tek ana çeviri üretildi; seçenek varyasyonları kaldırıldı." : context.lang === "zh" ? "已保留一个主译文，并移除选项变体。" : "One main translation was kept; option variants were removed.")}`
      ].join("\n\n");
    }

    function renderLocalizationBatch(items = []) {
      if (!items.length) return "";
      return items.map((item, index) => `<div class="loc-batch-item"><h4>${index + 1}. ${esc(item.name || item.genreLabel || "Store copy")}</h4>${formatLocalizationOutput(item.output)}</div>`).join("");
    }

    function localizationSourceFromRow(row = {}) {
      const entries = Object.entries(row);
      const sourceEntry = entries.find(([key]) => /source|string|ui|dialogue|dialog|text|copy|description|store|desc|metin|cümle|cumle|kelime|aciklama|açıklama/i.test(key));
      const genreEntry = entries.find(([key]) => /genre|type|category|tur|tür/i.test(key));
      const nameEntry = entries.find(([key]) => /game|name|title|project|oyun/i.test(key));
      const langEntry = entries.find(([key]) => /lang|language|target|dil/i.test(key));
      const fallbackText = entries.map(([, value]) => String(value || "").trim()).find((value) => value.length > 12) || "";
      return {
        source: String(sourceEntry?.[1] || fallbackText || "").trim(),
        genre: inferLocalizationGenre(`${genreEntry?.[1] || ""} ${sourceEntry?.[1] || fallbackText}`, normalizeLocalizationGenre(genreEntry?.[1])),
        name: String(nameEntry?.[1] || "").trim(),
        lang: normalizeLocalizationLang(langEntry?.[1])
      };
    }

    function normalizeLocalizationGenre(value) {
      const genre = String(value || "auto").toLowerCase();
      if (/fps|shooter|shoot|gun|battle royale/.test(genre)) return "fps";
      if (/mmo|mmorpg|rpg|role|guild|raid/.test(genre)) return "mmo";
      if (/strategy|4x|strat|war|kingdom|empire/.test(genre)) return "strategy";
      if (/casual|puzzle|match|merge|tile/.test(genre)) return "casual";
      if (/horror|survival|zombie/.test(genre)) return "horror";
      if (/race|racing|drift|car/.test(genre)) return "racing";
      if (/sim|simulation|tycoon|farm|city/.test(genre)) return "simulation";
      return "auto";
    }

    function normalizeLocalizationLang(value) {
      const lang = String(value || "").toLowerCase();
      if (/zh|cn|chinese|çince|cince|中文/.test(lang)) return "zh";
      if (/tr|turkish|turkce|türkçe/.test(lang)) return "tr";
      if (/en|english|ingilizce/.test(lang)) return "en";
      return $("locLang")?.value || "en";
    }

    async function localizationRowsFromFile(file) {
      if (!file) return [];
      if (/\.csv$|\.tsv$|\.txt$/i.test(file.name)) return rowsToObjects(parseDelimitedRows(await file.text()));
      if (!window.XLSX) throw new Error("Excel parser could not load. Save as CSV or use copy-paste.");
      const workbook = XLSX.read(await file.arrayBuffer(), { type: "array" });
      const firstSheet = workbook.SheetNames[0];
      const sheetRows = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet], { header: 1, defval: "" });
      return rowsToObjects(sheetRows);
    }

    async function localizeBatchRows(rows, sourceType = "excel") {
      const tone = $("locTone").value;
      const selectedGenre = $("locGenre").value;
      const mode = $("locMode")?.value || "game";
      const items = rows.map(localizationSourceFromRow).filter((item) => item.source);
      state.localizationForm = {
        ...(state.localizationForm || {}),
        genre: selectedGenre,
        lang: $("locLang").value,
        mode,
        tone
      };
      const outputs = [];
      for (const item of items.slice(0, 30)) {
        const genre = selectedGenre === "auto" ? item.genre : inferLocalizationGenre(item.source, selectedGenre);
        const lang = item.lang || $("locLang").value;
        let output = "";
        try {
          $("locBatchStatus").textContent = `Localizing ${outputs.length + 1}/${items.length} with backend GPT...`;
          output = await localizeWithBackend({ source: item.source, lang, tone, genre, mode });
        } catch (error) {
          output = "";
        }
        if (!output) {
          try {
            $("locBatchStatus").textContent = `Localizing ${outputs.length + 1}/${items.length} with GPT key...`;
            const direct = await localizeWithClientGpt({ source: item.source, lang, tone, genre, mode });
            output = direct?.text || "";
          } catch (error) {
            output = "";
          }
        }
        if (!output) {
          try {
            $("locBatchStatus").textContent = `Localizing ${outputs.length + 1}/${items.length} with Google Translate...`;
            output = await localizeWithBrowserGoogleTranslate({ source: item.source, lang, tone, genre, mode });
          } catch (error) {
            output = "";
          }
        }
        outputs.push({
          name: item.name || shortText(item.source, 42),
          genreLabel: localizationProfile(genre).label,
          output: output ? improveLocalizationOutput(output, { source: item.source, lang, genre, tone, mode }) : localizationUnavailableMessage(item.source, lang)
        });
      }
      state.localizationBatch = outputs;
      state.localizationBatchSource = sourceType;
      saveState();
      $("locBatchOutput").innerHTML = renderLocalizationBatch(outputs);
      $("locBatchStatus").textContent = outputs.length ? `${outputs.length} row(s) localized.` : "No usable source text found.";
    }

    async function handleLocalizationExcel() {
      const status = $("locBatchStatus");
      try {
        const file = $("locExcelFile").files?.[0];
        if (!file) {
          status.textContent = "Choose an Excel/CSV file first.";
          return;
        }
        status.textContent = "Reading file...";
        await localizeBatchRows(await localizationRowsFromFile(file), "excel");
      } catch (error) {
        status.textContent = "File could not be read: " + error.message;
      }
    }

    function localizationLanguageName(lang) {
      return lang === "zh" ? "Chinese" : lang === "tr" ? "Turkish" : "English";
    }

    async function localizeWithClientGpt({ source, lang, tone, genre, mode }) {
      const config = getSavedGptConfig();
      if (!config.openaiApiKey) return null;
      const baseUrl = normalizeGptBaseUrl(config.openaiBaseUrl || "https://api.openai.com/v1");
      const preferredModel = config.openaiModel && config.openaiModel !== "auto" ? config.openaiModel : "";
      const modelCandidates = gptModelCandidates(preferredModel);
      const languageName = localizationLanguageName(lang);
      const prompt = `You are a senior mobile game in-game localization specialist.
Translate and adapt the source text into ${languageName}.

Important:
- This is for game UI, in-game words, skill/item names, quest text, tutorial text, buttons, dialogue, rewards, and system messages.
- If mode is normal, give a faithful normal translation.
- If mode is game or both, still give one main translation; lightly adapt tone to the game genre without changing the meaning.
- Do not leave source-language fragments untranslated.
- Do not do broken word-by-word replacement.
- Use natural target-language grammar and correct characters.
- Keep short UI text short.
- Do not return Option 1, Option 2, Option 3, variants, or duplicate alternatives.
- Return one clean final translation only.
- Under the translation, provide a glossary with reusable terms or phrase suggestions.
- Preserve key meaning such as create, conquer, build, lead, reward, claim, upgrade, join, battle, survive, explore.
- For Turkish, use Turkish characters.
- For Chinese, use Simplified Chinese.
- Genre: ${genre}.
- Tone: ${tone}.
- Mode: ${mode}.

Return with clear headings in the target language:
Game type/style analysis
Translation
Glossary / reusable suggestions
Note
Source text

Source text:
${source}`;
      let lastError = "";
      for (const model of modelCandidates) {
        const response = await fetch(`${baseUrl}/chat/completions`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${config.openaiApiKey}`
          },
          body: JSON.stringify({
            model,
            messages: [
              { role: "system", content: "You produce high-quality mobile game localization. Return only the requested localized output." },
              { role: "user", content: prompt }
            ],
            temperature: 0.25,
            max_tokens: 1200,
            stream: false
          })
        }).catch((error) => ({ ok: false, status: "network", error }));
        if (!response.ok) {
          lastError = `${model}: ${await readGptError(response)}`;
          continue;
        }
        const data = await response.json().catch((error) => {
          lastError = `${model}: GPT JSON parse failed (${error.message})`;
          return null;
        });
        if (!data) continue;
        const text = data.choices?.[0]?.message?.content?.trim();
        if (text) return { text, model };
      }
      throw new Error(lastError || "GPT localization failed.");
    }

    async function localizeWithBackend({ source, lang, tone, genre, mode }) {
      const response = await fetchTeamApi("/api/localize", {
        method: "POST",
        headers: { "Content-Type": "application/json", ...sharedHeaders() },
        body: JSON.stringify({ source, lang, tone, genre, mode, project: state.project })
      });
      const result = await response.json();
      if (!result?.text) return "";
      if (["googletrans", "google-translate"].includes(result.source)) return "";
      return ["openai", "curated"].includes(result.source) ? result.text : "";
    }

    async function localizeWithBrowserGoogleTranslate({ source, lang, tone, genre, mode }) {
      const text = String(source || "").trim();
      if (!text) return "";
      const manual = manualLocalizationOutput({ source: text, lang, tone, genre, mode });
      if (manual) return manual;
      const target = lang === "zh" ? "zh-CN" : lang === "tr" ? "tr" : "en";
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${encodeURIComponent(target)}&dt=t&q=${encodeURIComponent(text)}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Google Translate HTTP ${response.status}`);
      const data = await response.json();
      const translated = Array.isArray(data?.[0]) ? data[0].map((part) => part?.[0] || "").join("").trim() : "";
      if (!translated || translated.toLowerCase() === text.toLowerCase()) return "";
      return formatBrowserGoogleLocalization({ source: text, translated, lang, tone, genre, mode });
    }

      }[lang] || {};
      const profile = localizationProfileForLang(genre, lang);
      let options = null;

    function shortGoogleLocalization(text, lang, source = "") {
      const clean = String(text || "").trim();
      const sourceText = String(source || "").trim();
      if (!clean) return "";
      if (lang === "zh") return clean.split(/[，。！？]/)[0].slice(0, 8);
      if (lang === "tr") {
        if (/leader|lider/i.test(`${sourceText} ${clean}`)) return "Kendi liderin ol";
        if (/Silahını kuşan, loncanla dünyayı fethet/i.test(clean)) return "Loncanla fethet";
        if (/Silahını kuşan, hedefe kilitlen ve dünyayı fethet/i.test(clean)) return "Hedefe kilitlen";
        if (/Ordunu hazırla ve dünyayı stratejinle fethet/i.test(clean)) return "Ordunu hazırla";
        if (/Hazırlan ve dünyayı kazan/i.test(clean)) return "Hazırlan ve kazan";
        if (/Silahını kuşan ve karanlığı alt et/i.test(clean)) return "Karanlığı alt et";
        if (/Hazırlan ve zirveye çık/i.test(clean)) return "Zirveye çık";
        if (/Düzenini kur ve kendi dünyanı inşa et/i.test(clean)) return "Dünyanı inşa et";
        if (clean.split(/\s+/).length <= 6) return clean;
      }
      if (lang === "en") {
        if (/leader/i.test(`${sourceText} ${clean}`)) return "Be your leader";
        if (/conquer the world with your guild/i.test(clean)) return "Conquer with your guild";
        if (/dominate the battlefield/i.test(clean)) return "Dominate the battlefield";
        if (/conquer the world with strategy/i.test(clean)) return "Command and conquer";
        if (/survive the darkness/i.test(clean)) return "Survive the darkness";
        if (/race to the top/i.test(clean)) return "Race to the top";
        if (/build/i.test(clean)) return "Build your world";
      }
      if (clean.includes(",")) return clean.split(",")[0].trim();
      const words = clean.split(/\s+/);
      return words.length <= 6 ? clean : words.slice(0, 6).join(" ");
    }

    function naturalGoogleLocalization(baseText, adaptedText, lang, genre, source = "") {
      const base = String(baseText || "").trim();
      const adapted = String(adaptedText || "").trim();
      const sourceText = String(source || "").trim();
      if (!base && !adapted) return "";
      if (lang === "tr") {
        if (/leader|lider/i.test(`${sourceText} ${base} ${adapted}`)) return "Hazırlan, kendi liderin ol";
        if (/^Silahını hazırla ve dünyayı fethet$/i.test(base)) {
          if (genre === "mmo") return "Silahını kuşan ve loncanla dünyayı fethet";
          if (genre === "fps") return "Silahını kuşan, hedefe kilitlen ve savaşı kazan";
          if (genre === "strategy") return "Ordunu hazırla ve dünyayı stratejinle fethet";
          if (genre === "casual") return "Hazırlan, dene ve dünyayı kazan";
          if (genre === "horror") return "Silahını kuşan ve karanlığa meydan oku";
          if (genre === "racing") return "Hazırlan ve zirveye doğru yarış";
          if (genre === "simulation") return "Düzenini kur ve kendi dünyanı büyüt";
        }
        return adapted
          .replace(/, loncanla /i, " ve loncanla ")
          .replace(/hedefe kilitlen ve dünyayı fethet/i, "hedefe kilitlen ve savaşı kazan")
          .replace(/dünyayı stratejinle fethet/i, "dünyayı stratejinle ele geçir");
      }
      if (lang === "en") {
        return adapted
          .replace(/conquer the world with your guild/i, "conquer the world together with your guild")
          .replace(/dominate the battlefield/i, "win every fight")
          .replace(/conquer the world with strategy/i, "conquer through strategy");
      }
      if (lang === "zh") {
        return adapted
          .replace(/与公会一起征服世界/, "和公会一起征服世界")
          .replace(/主宰战场/, "赢下战场")
          .replace(/用策略征服世界/, "用策略拿下世界");
      }
      return adapted || base;
    }

        if (genre === "fps") out = out.replace(/Silahını hazırla/i, "Silahını kuşan").replace(/dünyayı fethet/i, "hedefe kilitlen ve dünyayı fethet");

        if (genre === "horror") out = out.replace(/dünyayı fethet/i, "karanlığı alt et");
        if (genre === "racing") out = out.replace(/dünyayı fethet/i, "zirveye çık");
        if (genre === "simulation") out = out.replace(/fethet/i, "inşa et").replace(/Silahını/i, "Düzenini");
        return out;
      }
      if (lang === "en") {
        let out = clean;
        if (genre === "mmo") out = out.replace(/Ready your weapon/i, "Equip your weapon").replace(/conquer the world/i, "conquer the world with your guild");
        if (genre === "fps") out = out.replace(/Ready your weapon/i, "Lock and load").replace(/conquer the world/i, "dominate the battlefield");
        if (genre === "strategy") out = out.replace(/Ready your weapon/i, "Ready your army").replace(/conquer the world/i, "conquer the world with strategy");
        if (genre === "casual") out = out.replace(/conquer/i, "win").replace(/Ready your weapon/i, "Get ready");

        if (genre === "simulation") out = out.replace(/conquer/i, "build").replace(/weapon/i, "world");
        return out;
      }
      if (lang === "zh") {
        let out = clean;
        if (genre === "mmo") out = out.replace(/准备好武器/, "装备武器").replace(/征服世界/, "与公会一起征服世界");
        if (genre === "fps") out = out.replace(/准备好武器/, "装弹上阵").replace(/征服世界/, "主宰战场");
        if (genre === "strategy") out = out.replace(/准备好武器/, "集结军队").replace(/征服世界/, "用策略征服世界");
        if (genre === "casual") out = out.replace(/征服世界/, "赢下挑战");
        if (genre === "horror") out = out.replace(/征服世界/, "逃出黑暗");
        if (genre === "racing") out = out.replace(/征服世界/, "冲上巅峰");
        if (genre === "simulation") out = out.replace(/征服世界/, "打造你的世界");
        return out;
      }
      return clean;
    }

    function formatBrowserGoogleLocalization({ source, translated, lang, tone, genre, mode }) {
      const labels = {
        tr: { gameType: "Oyun türü", style: "Tarz analizi", rule: "Dil kuralı", tone: "Ton", translation: "Çeviri", words: "Sözlük / kullanabileceğin öneriler", source: "Kaynak metin", note: "Not", noteText: "Google Translate fallback kullanıldı; sonuç düz çeviri olarak temizlendi." },
        en: { gameType: "Game type", style: "Style analysis", rule: "Language rule", tone: "Tone", translation: "Translation", words: "Glossary / reusable suggestions", source: "Source text", note: "Note", noteText: "Google Translate fallback was used; output was cleaned as a direct translation." },
        zh: { gameType: "游戏类型", style: "风格分析", rule: "语言规则", tone: "语气", translation: "翻译", words: "术语 / 可复用建议", source: "源文本", note: "备注", noteText: "已使用 Google Translate fallback；结果已按直接翻译整理。" }
      }[lang] || {};
      const profile = localizationProfileForLang(genre, lang);
      const adapted = genreAdaptedTranslation(translated, lang, genre);
      const naturalText = naturalGoogleLocalization(translated, adapted, lang, genre, source);
      const finalTranslation = mode === "normal" ? translated : naturalText || adapted || translated;
      if (mode === "normal") {
        return `${labels.translation}:\n${finalTranslation}\n\n${labels.words}:\n${wordSuggestions(source, lang, genre)}\n\n${labels.source}:\n${source}\n\n${labels.note}: ${labels.noteText}`;
      }
      return `${labels.gameType}: ${profile.label}
${labels.style}: ${lang === "zh" ? "先做基础翻译，再作为游戏内文本使用。" : lang === "tr" ? "Önce temel çeviri yapıldı, sonra oyun içi metne hazırlandı." : "Base translation first, then prepared as in-game text."}
${labels.rule}: ${lang === "zh" ? "保留原意，短而自然。" : lang === "tr" ? "Anlamı koru, kısa ve doğal tut." : "Keep the meaning clear, short, and natural."}

${labels.translation}:
${finalTranslation}

${labels.words}:
${wordSuggestions(source, lang, genre)}

${labels.source}:
${source}

${labels.note}: ${labels.noteText}`;
    }

    async function generateLocalization() {
      const source = $("sourceCopy").value.trim();
      const lang = $("locLang").value;
      const tone = $("locTone").value;
      const mode = $("locMode")?.value || "game";
      const genre = inferLocalizationGenre(source, $("locGenre").value);
      const status = $("locStatus");
      state.localizationForm = {
        source,
        genre: $("locGenre").value,
        resolvedGenre: genre,
        lang,
        mode,
        tone
      };
      if (status) status.textContent = "Generating with backend...";
      try {
        const backendText = await localizeWithBackend({ source, lang, tone, genre, mode });
        if (backendText) {
          state.localizationOutput = improveLocalizationOutput(backendText, { source, lang, genre, tone, mode });
          saveState();
          $("locOutput").innerHTML = formatLocalizationOutput(state.localizationOutput);
          if (status) status.textContent = "Generated with backend.";
          return;
        }
        if (status) status.textContent = "Backend did not return GPT text; trying GPT key from Settings...";
      } catch (error) {
        if (status) status.textContent = "Backend unavailable; trying GPT key from Settings...";
      }
      try {
        const direct = await localizeWithClientGpt({ source, lang, tone, genre, mode });
        if (direct?.text) {
          state.localizationOutput = improveLocalizationOutput(direct.text, { source, lang, genre, tone, mode });
          saveState();
          $("locOutput").innerHTML = formatLocalizationOutput(state.localizationOutput);
          if (status) status.textContent = `Generated with GPT (${direct.model}).`;
          return;
        }
      } catch (directError) {
        if (status) status.textContent = `GPT direct failed: ${directError.message}. Trying Google Translate fallback...`;
      }
      try {
        const googleText = await localizeWithBrowserGoogleTranslate({ source, lang, tone, genre, mode });
        if (googleText) {
          state.localizationOutput = improveLocalizationOutput(googleText, { source, lang, genre, tone, mode });
          saveState();
          $("locOutput").innerHTML = formatLocalizationOutput(state.localizationOutput);
          if (status) status.textContent = "Generated with Google Translate fallback.";
          return;
        }
      } catch (googleError) {
        if (status) status.textContent = `Translation failed: ${googleError.message}`;
      }
      state.localizationOutput = localizationUnavailableMessage(source, lang);
      saveState();
      $("locOutput").innerHTML = formatLocalizationOutput(state.localizationOutput || "Output will appear here.");
    }

    async function requestAiModule(module, inputs = {}, options = {}) {
      const payload = {
        module,
        language: options.language || aiOutputLanguage(),
        modelMode: state.ai.settings.modelMode || "Auto",
        responseStyle: state.ai.settings.responseStyle || "professional",
        projectContext: state.project,
        inputs
      };
      let response;
      try {
        response = await fetchTeamApi("/api/ai", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...sharedHeaders() },
          body: JSON.stringify(payload)
        });
      } catch (error) {
        state.ai.settings.backendStatus = "unreachable";
        saveState();
        return { ok: false, backendUnreachable: true, message: aiMessage("backendUnreachable") };
      }
      let result = null;
      try {
        result = await response.json();
      } catch (error) {
        return { ok: false, message: aiMessage("invalidFormat") };
      }
      if (!result?.ok && (result?.code === "AI_NOT_CONFIGURED" || result?.error === "AI_NOT_CONFIGURED" || result?.notConfigured)) {
        state.ai.settings.backendStatus = "not configured";
        saveState();
        return { ok: false, notConfigured: true, message: aiMessage("notConfigured") };
      }
      if (!result?.ok && result?.code === "AI_RESPONSE_INVALID") return { ok: false, message: aiMessage("invalidFormat") };
      if (!result?.ok && result?.code === "AI_REQUEST_FAILED") return { ok: false, message: aiMessage("requestFailed") };
      if (!result?.ok) return { ok: false, message: result?.message || aiMessage("failed") };
      state.ai.settings.backendStatus = "configured";
      saveState();
      return { ...result, fromAiBackend: true };
    }

    async function fetchStoreReviewsIntoBox(statusId = "aiReviewStatus") {
      const payload = aiReviewStorePayload();
      if (!payload.query.trim()) {
        setAiStatus(statusId, "Önce oyun adı, keyword veya store linki gir.");
        return { ok: false, message: "Game keyword is required." };
      }
      setAiStatus(statusId, "Store yorumları çekiliyor...");
      let response;
      try {
        response = await fetchTeamApi("/api/store-reviews", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...sharedHeaders() },
          body: JSON.stringify(payload)
        });
      } catch (error) {
        setAiStatus(statusId, "Store yorumları çekilemedi. Backend açık mı kontrol et.");
        return { ok: false, message: error.message };
      }
      const result = await response.json().catch(() => ({ ok: false, error: "Invalid response" }));
      if (!result.ok || !result.reviews?.length) {
        setAiStatus(statusId, result.error || "Bu keyword için store yorumu bulunamadı.");
        return { ok: false, message: result.error || "No reviews found." };
      }
      const lines = result.reviews.map((item) => item.text).filter(Boolean);
      $("aiReviewText").value = lines.join("\n");
      setAiStatus(statusId, `${result.appName || payload.query}: ${lines.length} store yorumu çekildi.`);

        const result = await requestAiModule("campaignIdeas", inputs);
        if (!result.ok) { setAiStatus("aiCampStatus", result.message || aiMessage("failed")); return; }
        state.ai.campaign = { fromAiBackend: true, data: result.data };
        saveState();
        render();
      });
      $("aiCampDemoBtn").addEventListener("click", () => {
        state.ai.campaign = { demo: true, data: window.MockAiService.generateCampaignIdeas({
          gameName: $("aiCampGame").value,
          genre: $("aiCampGenre").value,
          region: $("aiCampRegion").value,
          goal: $("aiCampGoal").value,
          budget: $("aiCampBudget").value,
          channels: aiCheckedValues("aiCampChannel"),
          notes: $("aiCampNotes").value
        }) };
        saveState();
        render();
      });
    }
    function renderAiCampaignResult(result) {
      result = result || {};
      const socialIdeas = Array.isArray(result.socialIdeas) ? result.socialIdeas : [];
      const adCopies = result.adCopies || {};
      return `<div class="ai-result-stack">
        <div class="ai-card"><span class="ai-badge">${esc(result.campaignName || "")}</span><h4>${aiT("concept")}</h4><p>${esc(result.concept || "")}</p></div>
        <div class="ai-card"><h4>${aiT("audienceInsight")}</h4><p>${esc(result.audienceInsight || "")}</p></div>
        <div class="ai-card"><h4>${aiT("creativeAngle")}</h4><p>${esc(result.creativeAngle || "")}</p></div>
        <div class="ai-card"><h4>${aiT("socialIdeas")}</h4><table class="ai-table"><thead><tr><th>Channel</th><th>Idea</th><th>Execution</th></tr></thead><tbody>${socialIdeas.map((item) => `<tr><td>${esc(item.channel || "")}</td><td>${esc(item.idea || "")}</td><td>${esc(item.execution || "")}</td></tr>`).join("")}</tbody></table></div>
        <div class="ai-card"><h4>${aiT("kolIdeas")}</h4>${aiList(result.kolIdeas || [])}</div>
        <div class="ai-card"><h4>${aiT("eventIdeas")}</h4>${aiList(result.inGameEventIdeas || [])}</div>
        <div class="ai-card"><h4>${aiT("localizationRisks")}</h4>${aiList(result.localizationSuggestions || [])}</div>
        <div class="ai-card"><h4>Risk Notes</h4>${aiList(result.riskNotes || [])}</div>
        <div class="ai-card"><h4>${aiT("adCopy")}</h4><p><strong>Headlines:</strong> ${esc((adCopies.headlines || []).join(" | "))}</p><p><strong>Body:</strong> ${esc((adCopies.bodyTexts || []).join(" | "))}</p><p><strong>Push:</strong> ${esc((adCopies.pushNotifications || []).join(" | "))}</p></div>
      </div>`;
    }
    function aiWeeklyReportPage() {
      const result = aiVisibleResult(state.ai.report);
      $("page").innerHTML = `
        ${pageHead(aiT("aiReport"), aiT("aiReportSub"))}
        <div class="ai-module-grid">
          ${panel(aiT("aiReport"), `
            <div class="ai-form-grid">
              <div class="ai-full"><div class="field-label">${aiT("completed")}</div><textarea id="aiReportCompleted" rows="4"></textarea></div>
              <div class="ai-full"><div class="field-label">${aiT("ongoing")}</div><textarea id="aiReportOngoing" rows="4"></textarea></div>
              <div class="ai-full"><div class="field-label">${aiT("blockers")}</div><textarea id="aiReportBlockers" rows="4"></textarea></div>
              <div class="ai-full"><div class="field-label">${aiT("nextWeek")}</div><textarea id="aiReportNext" rows="4"></textarea></div>
              <div><div class="field-label">${aiT("department")}</div><select id="aiReportDept">${aiOptions(["Marketing","Localization","Operations","Community","Product","General"], "Marketing")}</select></div>
              <div><div class="field-label">${aiT("outputLanguage")}</div><select id="aiReportLang">${aiOptions(["Chinese","English","Turkish"], "English")}</select></div>
              <div class="ai-full"><div class="field-label">${aiT("reportStyle")}</div><select id="aiReportStyle">${aiOptions(["Formal","Concise","Detailed"], "Formal")}</select></div>
              <div class="ai-full"><button class="primary" id="aiReportBtn" type="button">${aiT("generateReport")}</button> ${aiDemoButton("aiReportDemoBtn")} <button class="ghost" disabled type="button">Export - ${aiT("comingSoon")}</button></div>
              <p class="note ai-full" id="aiReportStatus"></p>
            </div>
          `)}
          ${panel(aiT("reportPreview"), result ? `${result.demo ? renderAiDemoNotice() : ""}${renderAiReportResult(aiResultData(result))}` : aiEmptyState(aiT("aiReportSub")))}
        </div>`;
      $("aiReportBtn").addEventListener("click", async () => {
        const hasText = [$("aiReportCompleted").value, $("aiReportOngoing").value, $("aiReportBlockers").value, $("aiReportNext").value].some((value) => value.trim());
        if (!hasText) { $("aiReportStatus").textContent = "Please enter at least one task or note."; return; }
        setAiStatus("aiReportStatus", aiMessage("loading"));
        const inputs = {
          completedTasks: $("aiReportCompleted").value,
          ongoingTasks: $("aiReportOngoing").value,
          blockers: $("aiReportBlockers").value,
          nextWeekPriorities: $("aiReportNext").value,
          department: $("aiReportDept").value,
          language: $("aiReportLang").value,
          style: $("aiReportStyle").value
        };
        const result = await requestAiModule("weeklyReport", inputs);
        if (!result.ok) { setAiStatus("aiReportStatus", result.message || aiMessage("failed")); return; }
        state.ai.report = { fromAiBackend: true, data: result.data };
        saveState();
        render();
      });
      $("aiReportDemoBtn").addEventListener("click", () => {
        state.ai.report = { demo: true, data: window.MockAiService.generateWeeklyReport({
          completedTasks: $("aiReportCompleted").value || "Prepared campaign copy",
          ongoingTasks: $("aiReportOngoing").value,
          blockers: $("aiReportBlockers").value,
          nextWeekPriorities: $("aiReportNext").value || "Review next week priorities",
          department: $("aiReportDept").value,
          language: $("aiReportLang").value,
          style: $("aiReportStyle").value
        }) };
        saveState();
        render();
      });
    }
    function renderAiReportResult(result) {
      result = result || {};
      const sections = Array.isArray(result.sections) ? result.sections : [];
      const fullText = [result.title || "", ...sections.flatMap((section) => [section.heading || "", ...(section.items || []).map((item) => `- ${item}`)])].join("\n");
      return `<div class="ai-result-stack">
        <div class="ai-card"><span class="ai-badge">${esc(result.language || "")}</span><h3>${esc(result.title || "")}</h3></div>
        ${sections.map((section) => `<div class="ai-card"><h4>${esc(section.heading || "")}</h4>${aiList(section.items || [])}</div>`).join("")}
        ${aiCopyButton("aiReportCopy", fullText)}
      </div>`;
    }
    function aiWorkspaceRoute(message) {
      const text = String(message || "").toLowerCase();
      if (/code|bug|build|api|repository|repo|deploy|deployment|vite|react|next|server|json|html|css|javascript|debug/.test(text)) return "code";
      if (/localization|translation|çeviri|ceviri|turkish|ui wording/.test(text)) return "localization";
      if (/campaign|kol|marketing|launch/.test(text)) return "campaign";
      if (/weekly report|report|rapor|周报/.test(text)) return "report";
      return "general";
    }
    function aiWorkspacePage() {
      $("page").innerHTML = `
        ${pageHead(aiT("aiWorkspace"), aiT("aiWorkspaceSub"))}
        <div class="ai-module-grid">
          ${panel(aiT("aiWorkspace"), `
            <div class="ai-chat-box" id="aiChatBox">
              ${state.ai.chatMessages.length ? state.ai.chatMessages.map((msg) => `<div class="ai-bubble ${esc(msg.role)}">${msg.role === "assistant" ? `<strong>${esc(msg.title || "Assistant")}</strong><br>` : ""}${esc(msg.text || msg.summary || "")}${msg.bullets ? aiList(msg.bullets) : ""}</div>`).join("") : aiEmptyState("Try: Analyze these game reviews / Improve this Turkish localization / Generate a weekly report in Chinese")}
            </div>
            <div class="controls" style="margin-top:12px">
              <textarea id="aiChatInput" rows="3" placeholder="Ask about reviews, localization, campaign, or report..."></textarea>
              <button class="primary" id="aiChatSendBtn" type="button">${aiT("send")}</button>
              ${aiDemoButton("aiChatDemoBtn")}
            </div>
            <p class="note" id="aiChatStatus"></p>
          `)}
          ${panel(aiT("projectContext"), `
            <div class="ai-card"><strong>${esc(state.project.name)}</strong><p>${esc(state.project.genre)} | ${esc(state.project.markets)}</p><p class="note">${esc(state.project.goal)}</p></div>
            <div class="ai-card"><h4>Prompt ideas</h4>${aiList(["Analyze these game reviews", "Improve this Turkish localization", "Generate a weekly report in Chinese", "Create campaign ideas for Turkey", "Summarize product feedback"])}</div>
          `)}
        </div>`;
      $("aiChatSendBtn").addEventListener("click", async () => {
        const message = $("aiChatInput").value.trim();
        if (!message) return;
        state.ai.chatMessages.push({ role: "user", text: message });
        saveState();
        setAiStatus("aiChatStatus", aiMessage("loading"));
        const route = aiWorkspaceRoute(message);
        const result = await requestAiModule("workspace", { message, route });
        if (!result.ok) {
          state.ai.chatMessages.push({ role: "assistant", text: result.message || aiMessage("failed") });
        } else {
          const reply = result.data || {};
          state.ai.chatMessages.push({ role: "assistant", ...reply, text: reply.text || reply.summary || "" });
        }
        saveState();
        render();
      });
      $("aiChatDemoBtn").addEventListener("click", () => {
        const message = $("aiChatInput").value.trim() || "Create campaign ideas for Turkey";
        state.ai.chatMessages.push({ role: "user", text: message });
        const reply = window.MockAiService.generateChatResponse({ message, uiLanguage: state.lang, project: state.project });
        state.ai.chatMessages.push({ role: "assistant", ...reply, text: `[DEMO] ${reply.summary}` });
        saveState();
        render();
      });
      const box = $("aiChatBox");
      if (box) box.scrollTop = box.scrollHeight;
    }
    function aiSettingsPage() {
      const settings = state.ai.settings;
      $("page").innerHTML = `
        ${pageHead(aiT("aiSettings"), aiT("aiSettingsSub"))}
        <div class="grid two">
          ${panel(aiT("profile"), `
            <div class="grid two">
              <div><div class="field-label">Name</div><input id="aiSetName" value="${esc(settings.name)}"></div>
              <div><div class="field-label">Email</div><input id="aiSetEmail" value="${esc(settings.email)}"></div>
              <div><div class="field-label">Role</div><input id="aiSetRole" value="${esc(settings.role)}"></div>
              <div><div class="field-label">Company / Team</div><input id="aiSetCompany" value="${esc(settings.company)}"></div>
            </div>
          `)}
          ${panel(aiT("workspace"), `
            <div class="grid two">
              <div><div class="field-label">Workspace name</div><input id="aiSetWorkspace" value="${esc(settings.workspaceName)}"></div>
              <div><div class="field-label">Default project type</div><input id="aiSetProjectType" value="${esc(settings.defaultProjectType)}"></div>
              <div><div class="field-label">Default market</div><input id="aiSetMarket" value="${esc(settings.defaultMarket)}"></div>
              <div><div class="field-label">Default language</div><input id="aiSetLang" value="${esc(settings.defaultLanguage)}"></div>
            </div>
          `)}
          ${panel("AI", `
            <div class="grid two">
              <div><div class="field-label">Model Mode</div><select id="aiSetModelMode">${aiOptions(["Auto","GPT","Codex for code tasks"], settings.modelMode)}</select></div>
              <div><div class="field-label">Output Language</div><select id="aiSetOutputLanguage">${aiOptions(["Follow UI","Chinese","Turkish","English"], settings.outputLanguage)}</select></div>
              <div><div class="field-label">Response Style</div><select id="aiSetResponseStyle">${aiOptions(["concise","detailed","professional"], settings.responseStyle)}</select></div>
              <div><div class="field-label">AI Backend Status</div><div class="field-value">${esc(settings.backendStatus || "unknown")}</div></div>
              <div class="ai-full"><p class="note">API keys are not stored in this frontend. Add the server API key in environment settings.</p></div>
            </div>
          `)}
          ${panel(aiT("theme"), `
            <select id="aiSetTheme">${aiOptions(["Light","Dark","System"], settings.theme)}</select>
            <p class="note">AI modules use the backend AI service. Demo output appears only when you click Use demo example. Existing protected API features stay separate.</p>
            <button class="primary" id="aiSettingsSaveBtn" type="button">${aiT("saveSettings")}</button>
            <button class="ghost" id="aiStatusCheckBtn" type="button">Check AI status</button>
            <p class="note" id="aiSettingsStatus"></p>
          `)}
        </div>`;
      $("aiStatusCheckBtn").addEventListener("click", async () => {
        const status = await requestAiModule("status", {});
        state.ai.settings.backendStatus = status.ok ? "configured" : "not configured";
        saveState();
        render();
      });
      $("aiSettingsSaveBtn").addEventListener("click", () => {
        state.ai.settings = {
          ...state.ai.settings,
          name: $("aiSetName").value,
          email: $("aiSetEmail").value,
          role: $("aiSetRole").value,
          company: $("aiSetCompany").value,
          workspaceName: $("aiSetWorkspace").value,
          defaultProjectType: $("aiSetProjectType").value,
          defaultMarket: $("aiSetMarket").value,
          defaultLanguage: $("aiSetLang").value,
          modelMode: $("aiSetModelMode").value,
          outputLanguage: $("aiSetOutputLanguage").value,
          responseStyle: $("aiSetResponseStyle").value,
          theme: $("aiSetTheme").value
        };
        saveState();
        $("aiSettingsStatus").textContent = aiT("saved");
      });
    }

    function render() {
      document.documentElement.lang = state.lang === "zh" ? "zh" : state.lang;
      renderShell();
      const pages = { dashboard: dashboardPage, search: searchPage, list: listPage, localization: localizationPage, competitors: competitorsPage, aiReviews: aiReviewsPage, aiSocial: aiSocialPage, aiLocQa: aiLocQaPage, aiCampaign: aiCampaignPage, aiReport: aiWeeklyReportPage, aiWorkspace: aiWorkspacePage, aiSettings: aiSettingsPage, settings: settingsPage, help: helpPage };
      (pages[state.page] || dashboardPage)();
      bindAiCopyButtons();
      updateTeamLoginStatus();
    }

    $("languageSelect").addEventListener("change", (event) => { state.lang = event.target.value; saveState(); render(); });
    $("editBriefBtn").addEventListener("click", () => { state.page = "settings"; saveState(); render(); });
    $("exportBtn").addEventListener("click", exportCsv);
    $("teamLoginBtn").addEventListener("click", openAccountModal);
    $("accountCloseBtn").addEventListener("click", closeAccountModal);
    $("accountSaveBtn").addEventListener("click", saveAccountLogin);
    $("accountLogoutBtn").addEventListener("click", logoutAccount);
    $("accountModal").addEventListener("click", (event) => {
      if (event.target.id === "accountModal") closeAccountModal();
    });
    render();
    loadSharedState();
  </script>
</body>
</html>
