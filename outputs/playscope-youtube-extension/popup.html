<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 14px;
      font-family: Inter, Arial, sans-serif;
      color: #172033;
      background: #f8fbfc;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    p {
      margin: 0 0 12px;
      color: #667085;
      font-size: 12px;
      line-height: 1.4;
    }
    button {
      width: 100%;
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      background: #008b84;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>PlayScope Collector</h1>
  <p>Open a YouTube channel or video page. PlayScope will calculate public stats with the YouTube API.</p>
  <button id="collect">Send current page</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
